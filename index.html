<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="베트남어공부">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197473.png">
    
    <title>태만&명희의 프리미엄 베트남어</title>
    
    <style>
        :root {
            --bg-deep: #020617;
            --bg-card: rgba(15, 23, 42, 0.8);
            --accent-gold: #fbbf24;   /* 베트남어 강조색 */
            --accent-green: #10b981;  /* 한국어 뜻 강조색 */
            --accent-red: #f43f5e;
            --text-main: #ffffff;    /* 발음 및 기본 텍스트 */
            --text-dim: #cbd5e1;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-deep); font-family: -apple-system, sans-serif; user-select: none; -webkit-user-select: none; }
        body { text-align: center; color: var(--text-main); display: flex; flex-direction: column; }
        
        .card { 
            background: var(--bg-deep);
            background-image: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            width: 100%; height: 100dvh; padding: 24px; box-sizing: border-box; 
            display: flex; flex-direction: column; justify-content: space-between; 
        }

        .content-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; width: 100%; }
        
        .star-btn { background: none !important; border: none !important; outline: none !important; font-size: 42px; color: rgba(255,255,255,0.15); cursor: pointer; transition: all 0.3s; }
        .star-btn.active { color: var(--accent-gold); filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.5)); }

        /* 일반 모드 색상 조정 */
        .vn { font-weight: 800; color: var(--accent-gold); margin-bottom: 10px; word-break: break-word; line-height: 1.1; letter-spacing: -0.03em; text-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
        .pron { font-size: 22px; color: #fff; margin-bottom: 10px; opacity: 0.9; }
        .kr { font-size: 26px; font-weight: 600; color: var(--accent-green); margin-bottom: 15px; }
        
        .ex-box { background: rgba(0,0,0,0.25); padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); margin-top: 10px; }
        .ex-vn { color: var(--accent-gold); font-weight: 600; font-size: 22px; line-height: 1.3; }
        .ex-pron { font-size: 16px; color: #fff; margin-top: 5px; opacity: 0.8; }
        .ex-kr { font-size: 16px; color: var(--accent-green); margin-top: 5px; font-weight: bold; }
        
        .arrow-btn { background: none; border: none; color: rgba(255, 255, 255, 0.1); font-size: 50px; cursor: pointer; padding: 0 10px; }
        .arrow-btn:active { color: var(--accent-green); }

        .bottom-controls { width: 100%; padding-bottom: 15px; }
        .play-btn { height: 65px; width: 100%; border-radius: 18px; border: none; font-size: 24px; font-weight: 900; background: linear-gradient(135deg, #f43f5e, #be123c); color: white; margin-bottom: 12px; box-shadow: 0 8px 20px rgba(244, 63, 94, 0.3); cursor: pointer; letter-spacing: 0.15em; }

        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row-btn { flex: 1; height: 55px; border-radius: 15px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-gold { background: linear-gradient(135deg, #fbbf24, #d97706); color: #451a03; }
        .btn-outline { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); }
        .sheet-select { background: #0f172a; color: var(--accent-green); border: 1px solid var(--accent-green); text-align-last: center; appearance: none; }

        .quick-settings { display: flex; justify-content: space-around; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 15px; font-size: 14px; margin-bottom: 10px; }
        .quick-settings label { display: flex; align-items: center; gap: 6px; color: var(--text-dim); cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding-top: 20px; overflow-y: auto; }
        .modal-content { background: #0f172a; margin: 10px auto; width: 94%; max-width: 480px; border-radius: 24px; padding: 20px; border: 1px solid var(--glass-border); text-align: left; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: white; }
        .close-btn { background: var(--accent-red); color: white; border: none; padding: 8px 16px; border-radius: 10px; cursor: pointer; }

        #blackoutOverlay { background: #000; position: fixed; top:0; left:0; width:100%; height:100%; z-index:9999; display:none; flex-direction:column; justify-content:center; align-items:center; cursor:pointer; }

        .cal-legend { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 15px; font-size: 9px; color: #94a3b8; font-weight: 300; letter-spacing: -0.01em; opacity: 0.8; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 12px; }
        .cal-day { background: rgba(255,255,255,0.03); border-radius: 6px; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; min-height: 40px; font-size: 11px; color: white; }
        .cal-time { font-size: 9px; color: #ffffff; margin-top: 3px; font-weight: 400; letter-spacing: -0.01em; }

        /* PC 모드 스타일 업데이트 */
        .pc-bar-container { display: flex; align-items: center; justify-content: space-between; width: 100%; height: 100dvh; background: #0f172a; padding: 0 15px; box-sizing: border-box; border-top: 2px solid var(--accent-green); }
        .pc-side-group { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .pc-content-area { display: flex; align-items: center; justify-content: center; flex: 1; overflow: hidden; }
        .pc-text-group { display: flex; align-items: center; gap: 10px; overflow: hidden; white-space: nowrap; padding: 0 15px; cursor: pointer; }
        
        .pc-vn { color: var(--accent-gold); font-weight: 800; font-size: 20px; } /* 베트남어 황금색 */
        .pc-pron { color: #fff; font-size: 15px; font-weight: bold; opacity: 0.8; } /* 발음 흰색 */
        .pc-kr { color: var(--accent-green); font-size: 16px; font-weight: bold; } /* 한국어 녹색 */
        
        .pc-ex { color: var(--accent-gold); font-size: 18px; margin-left: 10px; border-left: 2px solid rgba(255,255,255,0.1); padding-left: 10px; font-weight: bold; opacity: 0.9; }
        .pc-ex-pron { color: #fff; font-size: 14px; font-weight: bold; opacity: 0.7; }
        .pc-ex-kr { color: var(--accent-green); font-size: 15px; font-weight: bold; }

        .pc-btn { border: none; border-radius: 6px; padding: 8px 14px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; white-space: nowrap; }
        .pc-btn.start { background: var(--accent-green); color: #000; }
        .pc-btn.stop { background: var(--accent-red); color: #fff; }
        .pc-btn.mode { background: rgba(255,255,255,0.05); color: #cbd5e1; border: 1px solid rgba(255,255,255,0.1); }
        .pc-btn.hide { background: var(--accent-gold); color: #451a03; }
        .pc-nav-btn { background: none; border: none; color: var(--accent-gold); font-size: 28px; font-weight: bold; cursor: pointer; padding: 0 15px; opacity: 0.5; transition: 0.3s; }
        .pc-nav-btn:hover { opacity: 1; transform: scale(1.2); }

        .cheer-box { background: rgba(251, 191, 36, 0.1); border: 1px dashed var(--accent-gold); padding: 12px; border-radius: 15px; text-align: center; margin-bottom: 15px; color: var(--accent-gold); font-size: 14px; font-weight: 800; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="noticeToast"></div>
    <div id="blackoutOverlay" onclick="toggleBlackout()">
        <p style="font-size: 20px; color: #1e293b; font-weight: bold;">LOW POWER MODE</p>
        <p style="font-size: 12px; color: #0f172a;">Touch to Wake</p>
    </div>

    <div id="app" style="height: 100%;"></div>

    <div id="listModal" class="modal">
        <div class="modal-content" style="max-width: 550px; height: 80vh; display: flex; flex-direction: column;">
            <div class="modal-header">
                <h3 style="margin:0; font-size:18px; color:var(--accent-gold);">전체 항목 리스트</h3>
                <button class="close-btn" onclick="closeListModal()">닫기</button>
            </div>
            <div id="listContainer" style="flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px;"></div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div id="cheerMessage" class="cheer-box">의욕 충전 중...</div>
            <div class="modal-header">
                <h2 style="color: var(--accent-green); margin:0; font-size: 20px;">PREMIUM SETTINGS</h2>
                <button class="close-btn" onclick="closeSettings()">닫기</button>
            </div>
            <button class="btn-gold row-btn" style="width:100%; margin-bottom:15px;" onclick="openCalendar()">📊 학습 리포트 보기</button>
            <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 15px;">
                <div style="margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center; background: rgba(244, 63, 94, 0.15); padding: 12px; border-radius: 10px; border: 1px solid rgba(244, 63, 94, 0.4);">
                    <span style="color:#f43f5e; font-weight:900; font-size: 14px;">💸 구글 과금 차단 (무료 폰 음성 대체)</span>
                    <input type="checkbox" id="hideVnToggle" style="transform: scale(1.3);" onchange="saveSettings(); notify(this, 'hideVn')">
                </div>
                <div style="margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center; background: rgba(251, 191, 36, 0.15); padding: 12px; border-radius: 10px; border: 1px solid rgba(251, 191, 36, 0.4);">
                    <span style="color:var(--accent-gold); font-weight:900; font-size: 14px;">🔓 200만 자 락 풀기 (최대 300만 자)</span>
                    <input type="checkbox" id="unlockLimitToggle" style="transform: scale(1.3);" onchange="saveSettings(); notify(this, 'unlockLimit')">
                </div>
                <div style="font-size: 12px; color: var(--text-dim); text-align: center; margin-bottom: 18px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px;">
                    이번 달 프리미엄 AI 사용량: <span id="monthlyUsageDisplay" style="color: var(--accent-gold); font-weight: bold;">0</span> / <span id="maxLimitDisplay">2,000,000</span> 자<br>
                    <span id="limitHintDisplay" style="font-size: 10px; color: #94a3b8;">(195만 자 도달 시 1차 안전 락 작동)</span>
                </div>
                <div style="margin-bottom: 18px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:var(--accent-gold); font-weight:bold;">🔊 어플 단독 볼륨</span>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button class="count-ctrl-btn" onclick="adjustVolume('appVolume', -0.1)">-</button>
                        <input type="range" id="appVolume" class="vol-slider" min="0" max="1" step="0.1" onchange="saveSettings(); showNotice('🔊 볼륨 조절')" style="width: 80px;">
                        <button class="count-ctrl-btn" onclick="adjustVolume('appVolume', 0.1)">+</button>
                    </div>
                </div>
                <div style="margin-bottom: 15px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:var(--accent-green); font-weight:bold;">🗣️ 구글 AI 목소리</span>
                    <select id="voiceType" onchange="saveSettings(); showNotice('🗣️ 목소리 변경')" style="background:#020617; color:#fff; border:none; padding:4px; border-radius:5px; width: 180px; font-size: 13px;">
                        <option value="vi-VN-Wavenet-A">하노이 여성 (Wavenet A)</option>
                        <option value="vi-VN-Wavenet-B">하노이 남성 (Wavenet B)</option>
                        <option value="vi-VN-Neural2-A">하노이 프리미엄 여성 (Neural2 A)</option>
                        <option value="vi-VN-Neural2-D">하노이 프리미엄 남성 (Neural2 D)</option>
                        <option value="vi-VN-Wavenet-C">호치민 여성 (Wavenet C)</option>
                        <option value="vi-VN-Wavenet-D">호치민 남성 (Wavenet D)</option>
                    </select>
                </div>
                <div style="margin-bottom: 15px; display:flex; justify-content:space-between; align-items:center;"><span style="color:var(--accent-red);">🔋 배터리 20% 보호</span><input type="checkbox" id="batteryProtect" onchange="saveSettings(); notify(this, 'battery')"></div>
                <div style="margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size: 13px;">🔁 본문 🇻🇳 반복</span>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <button class="count-ctrl-btn" onclick="changeGlobalCount('wordVn', -1)">-</button>
                        <span id="wordVnCountDisplay" style="min-width:25px; text-align:center;">5</span>
                        <button class="count-ctrl-btn" onclick="changeGlobalCount('wordVn', 1)">+</button>
                    </div>
                </div>
                <div style="margin-bottom: 15px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size: 13px;">🔁 본문 🇰🇷 반복</span>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <label style="font-size: 11px; color: var(--accent-gold); cursor:pointer;"><input type="checkbox" id="hideKrWord" onchange="saveSettings(); notify(this, 'krWord')"> KR OFF</label>
                        <button class="count-ctrl-btn" onclick="changeGlobalCount('wordKr', -1)">-</button>
                        <span id="wordKrCountDisplay" style="min-width:25px; text-align:center;">2</span>
                        <button class="count-ctrl-btn" onclick="changeGlobalCount('wordKr', 1)">+</button>
                    </div>
                </div>
                <div style="margin-bottom: 15px; display:flex; justify-content:space-between; align-items:center;"><span>⏰ 타이머</span><select id="sleepTimer" onchange="saveSettings()" style="background:#020617; color:#fff; border:none; padding:4px; border-radius:5px;"><option value="0">OFF</option><option value="60">60분</option><option value="120">120분</option><option value="240">240분</option><option value="300">300분</option><option value="360">360분</option><option value="420">420분</option><option value="480">480분</option><option value="540">540분</option></select></div>
                <div style="margin-bottom: 15px; display:flex; justify-content:space-between; align-items:center;"><span>⏳ 대기 시간</span><select id="delayTime" onchange="saveSettings(); showNotice('⏳ 대기 시간 변경')" style="background:#020617; color:#fff; border:none; padding:4px; border-radius:5px;"><option value="0">없음</option><option value="1000">1초</option><option value="2000">2초</option><option value="3000">3초</option><option value="4000">4초</option><option value="5000">5초</option><option value="6000">6초</option><option value="7000">7초</option><option value="8000">8초</option><option value="9000">9초</option><option value="10000">10초</option></select></div>
            </div>
            <div class="row"><button class="row-btn btn-outline" style="font-size: 12px;" onclick="exportData()">💾 백업</button><button class="row-btn btn-outline" style="font-size: 12px;" onclick="importData()">📂 복구</button></div>
        </div>
    </div>

    <audio id="bgmPlayer" loop crossorigin="anonymous"></audio>
    <input type="file" id="importFile" style="display:none" onchange="processFile(this)">

    <script>
        const sheetId = '1AiQwqgLg_XBHTiHWZXY0n2qN2Mz4NfIVcR2MxRfqkOc';
        const sheetNames = { '단어': '단어', '문장표현': '문장표현', '문법': '문법' };
        let allWords = [], words = [], isPlaying = false, isSkipping = false, skipDirection = 1, sleepTimerId = null;
        let savedIndex = 0, completedWords = {}, starredWords = {}, dailyTime = {}, wakeLock = null, hitCounts = {};
        let currentWordRep = 0, currentExRep = 0, currentPlayingIndex = -1, masterWordList = [], currentApiAudio = null; 
        let isPcMode = localStorage.getItem('vn_pc_mode') === 'true', audioCtx, gainNode, audioTrack;
        let monthlyCharCount = 0, currentMonthStr = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
        
        try { 
            savedIndex = parseInt(localStorage.getItem('vn_index') || '0');
            completedWords = JSON.parse(localStorage.getItem('vn_completed') || '{}');
            starredWords = JSON.parse(localStorage.getItem('vn_starred') || '{}');
            dailyTime = JSON.parse(localStorage.getItem('vn_daily_time') || '{}');
            hitCounts = JSON.parse(localStorage.getItem('vn_hit_counts') || '{}');
            let savedMonth = localStorage.getItem('vn_month_str');
            if (savedMonth !== currentMonthStr) { localStorage.setItem('vn_month_str', currentMonthStr); localStorage.setItem('vn_monthly_chars', '0'); monthlyCharCount = 0; } 
            else { monthlyCharCount = parseInt(localStorage.getItem('vn_monthly_chars') || '0'); }
        } catch(e) {}

        let savedVoiceRate = localStorage.getItem('vn_voiceRate') || '0.9';
        let savedWordVnCount = localStorage.getItem('vn_wordVnCount') !== null ? parseInt(localStorage.getItem('vn_wordVnCount')) : 5;
        let savedWordKrCount = localStorage.getItem('vn_wordKrCount') !== null ? parseInt(localStorage.getItem('vn_wordKrCount')) : 2;
        let savedExVnCount = localStorage.getItem('vn_exVnCount') !== null ? parseInt(localStorage.getItem('vn_exVnCount')) : 1;
        let savedExKrCount = localStorage.getItem('vn_exKrCount') !== null ? parseInt(localStorage.getItem('vn_exKrCount')) : 1;
        let savedTimer = localStorage.getItem('vn_timer') || '240';
        let savedShuffle = localStorage.getItem('vn_shuffle') === 'true';
        let savedStudyMode = localStorage.getItem('vn_studyMode') || '단어'; 
        let savedDelayTime = localStorage.getItem('vn_delayTime') || '1000';
        let savedHideKrWord = localStorage.getItem('vn_hideKrWord') === 'true';
        let savedHideKrEx = localStorage.getItem('vn_hideKrEx') === 'true';
        let savedHideVn = localStorage.getItem('vn_hideVn') !== null ? (localStorage.getItem('vn_hideVn') === 'true') : true;
        let savedUnlockLimit = localStorage.getItem('vn_unlockLimit') === 'true';
        let reviewMode = localStorage.getItem('vn_reviewMode') === 'true';
        let savedBatteryProtect = localStorage.getItem('vn_batteryProtect') === 'true';
        let savedHitCountToggle = localStorage.getItem('vn_hit_count_toggle') === 'true';
        let savedVoiceType = localStorage.getItem('vn_voiceType') || 'vi-VN-Wavenet-C';
        let savedAppVolume = localStorage.getItem('vn_app_volume') || '0.8';

        loadData(savedStudyMode);
        async function loadMasterList() { try { for (const name in sheetNames) { const data = await fetchSheetByName(sheetNames[name]); masterWordList = masterWordList.concat(data); } } catch(e) {} }
        loadMasterList();
        setInterval(() => { if (isPlaying) { const todayStr = getTodayStr(new Date()); dailyTime[todayStr] = (dailyTime[todayStr] || 0) + 10; localStorage.setItem('vn_daily_time', JSON.stringify(dailyTime)); } }, 10000);

        function showNotice(msg) { const toast = document.getElementById('noticeToast'); toast.innerText = msg; toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 2000); }
        function notify(el, type) { const isOn = el.checked; let msg = ""; switch(type) { case 'hideVn': msg = isOn ? "💸 구글 요금 차단 (무료 음성)" : "🔊 구글 프리미엄 음성"; break; case 'unlockLimit': msg = isOn ? "🔓 락 해제" : "🔒 요금 방어 작동"; break; } showNotice(msg); }
        async function loadData(mode) { allWords = []; try { if (mode === '전체랜덤') { for (const name in sheetNames) { const data = await fetchSheetByName(sheetNames[name]); allWords = allWords.concat(data); } } else { allWords = await fetchSheetByName(sheetNames[mode]); } } catch (e) { } applyModeFilter(); }
        function applyModeFilter() { if (reviewMode) { words = allWords.filter(w => starredWords[w.A]); if (words.length === 0) { reviewMode = false; localStorage.setItem('vn_reviewMode', 'false'); words = allWords; } } else { words = allWords; } if (savedIndex >= words.length) savedIndex = 0; renderWord(); }
        async function fetchSheetByName(name) { const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`; const res = await fetch(url); const data = await res.text(); return data.split('\n').slice(1).map(row => { const cols = row.split('","').map(c => c.replace(/(^"|"$)/g, '')); return { A: cols[0] || '', B: cols[1] || '', C: cols[2] || '', D: cols[3] || '', E: cols[4] || '', F: cols[5] || '', G: cols[6] || '' }; }).filter(w => w.A.trim() !== ''); }
        function togglePcMode() { isPcMode = !isPcMode; localStorage.setItem('vn_pc_mode', isPcMode); renderWord(); }

        function renderWord() {
            const app = document.getElementById('app');
            if (words.length === 0) { app.innerHTML = '<div class="card">데이터 로딩 중...</div>'; return; }
            const w = words[savedIndex], isCompleted = completedWords[w.A], isStarred = starredWords[w.A];
            
            if (isPcMode) {
                let html = `<div class="pc-bar-container">`;
                html += `<div class="pc-side-group"><button class="pc-btn mode" onclick="togglePcMode()">📱 일반 모드</button><button class="pc-btn hide" onclick="toggleComplete()">✅ 암기 끝</button></div>`;
                html += `<div class="pc-content-area"><button class="pc-nav-btn" onclick="moveWord(-1)">‹</button>`;
                html += `<div class="pc-text-group" onclick="openListModal()" title="목록 열기">`;
                html += `<span class="pc-vn">${w.A}</span>`;
                if (w.B) html += `<span class="pc-pron">[${w.B}]</span>`;
                if (w.C) html += `<span class="pc-kr">(${w.C})</span>`;
                if (w.D) {
                    html += `<span class="pc-ex">${w.D}</span>`;
                    if (w.E) html += `<span class="pc-ex-pron">[${w.E}]</span>`;
                    if (w.F) html += `<span class="pc-ex-kr">(${w.F})</span>`;
                }
                html += `</div><button class="pc-nav-btn" onclick="moveWord(1)">›</button></div>`;
                html += `<div class="pc-side-group">`;
                if (!isPlaying) { html += `<button class="pc-btn start" onclick="startSleepMode()">▶ 시작</button>`; }
                else { html += `<button class="pc-btn stop" onclick="stopSleepMode()">⏸ 멈춤</button>`; }
                html += `</div></div>`;
                app.innerHTML = html;
                return; 
            }

            let vnSize = w.A.length > 15 ? '34px' : (w.A.length > 8 ? '44px' : '52px');
            let html = '<div class="card">';
            html += `<div class="status" style="cursor:pointer; display:inline-block; margin:0 auto 10px auto; padding:6px 15px; background:rgba(255,255,255,0.05); border-radius:20px; font-size:12px; color:var(--accent-gold); border: 1px solid var(--glass-border);" onclick="openListModal()">` + (reviewMode ? '⭐ REVIEW' : 'MODE: ' + savedStudyMode) + ' | ' + (savedIndex + 1) + '/' + words.length + ' 🔍 </div><div class="content-wrap">';
            html += `<button class="star-btn ${isStarred ? 'active' : ''}" onclick="toggleStar()">${isStarred ? '★' : '☆'}</button>`;
            if (isCompleted) html += '<div style="color:var(--accent-gold); font-size:14px; margin-bottom:5px; font-weight:bold;">✅ 마스터한 항목</div>';
            html += '<div style="display: flex; align-items: center; justify-content: space-between;"><button class="arrow-btn" onclick="moveWord(-1)">‹</button><div class="vn" style="font-size:' + vnSize + ';">' + w.A + '</div><button class="arrow-btn" onclick="moveWord(1)">›</button></div>';
            if (w.B) html += '<div class="pron">[' + w.B + ']</div>';
            html += '<div class="kr">' + w.C + '</div>';
            if (w.D) { html += '<div class="ex-box"><div class="ex-vn">' + w.D + '</div>'; if (w.E) html += '<div class="ex-pron">[' + w.E + ']</div>'; html += '<div class="ex-kr">' + w.F + '</div></div>'; }
            html += '</div><div class="bottom-controls">';
            if (!isPlaying) { html += '<button class="play-btn" onclick="startSleepMode()">START</button>'; }
            else { html += '<button class="play-btn" style="background:#334155;" onclick="stopSleepMode()">PAUSE (일시정지)</button>'; }
            html += `<div class="row"><button class="row-btn btn-gold" onclick="toggleComplete()">암기 끝! 숨기기</button><select class="row-btn btn-outline sheet-select" onchange="changeStudyModeMain(this)">`;
            ['단어', '문장표현', '문법', '전체랜덤'].forEach(m => { html += `<option value="${m}" ${savedStudyMode === m ? 'selected' : ''}>${m}</option>`; });
            html += `</select></div><div class="row"><button class="row-btn btn-outline" style="color:var(--accent-gold);" onclick="openCompletedList()">📋 완료 목록</button><button class="row-btn btn-outline" onclick="openSettings()">⚙️ 설정</button></div>`;
            html += `<div class="quick-settings"><label><input type="checkbox" id="mainReviewMode" ${reviewMode ? 'checked' : ''} onchange="toggleMainReview()"> ⭐ 별표</label><label><input type="checkbox" id="mainShuffleMode" ${savedShuffle ? 'checked' : ''} onchange="toggleMainShuffle()"> 🔀 랜덤</label><button onclick="togglePcMode()" style="background:none; border:none; color:#cbd5e1; cursor:pointer; font-weight:bold; font-size:13px;">💻 PC모드</button></div></div></div>`;
            app.innerHTML = html;
        }

        function openListModal() { const container = document.getElementById('listContainer'); let html = ''; words.forEach((w, idx) => { const isCurrent = idx === savedIndex; html += `<div onclick="jumpToWord(${idx})" style="padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; cursor: pointer; background: ${isCurrent ? 'rgba(251, 191, 36, 0.1)' : 'transparent'};"><div style="width: 40px; color: var(--accent-gold); font-size: 12px;">${idx + 1}</div><div style="flex: 1; color: var(--accent-gold); font-weight: bold; font-size: 14px;">${w.A}</div><div style="flex: 1; color: var(--accent-green); font-size: 12px; text-align: right; overflow: hidden; text-overflow: ellipsis;">${w.C}</div></div>`; }); container.innerHTML = html; document.getElementById('listModal').style.display = 'block'; setTimeout(() => { const activeEl = container.children[savedIndex]; if(activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 50); }
        function closeListModal() { document.getElementById('listModal').style.display = 'none'; }
        function jumpToWord(index) { savedIndex = index; localStorage.setItem('vn_index', savedIndex); if (isPlaying) { isSkipping = true; window.speechSynthesis.cancel(); if (currentApiAudio) { currentApiAudio.pause(); currentApiAudio = null; } currentWordRep = 0; currentExRep = 0; } closeListModal(); renderWord(); showNotice(`${index + 1}번 이동`); }
        async function requestWakeLock() { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
        function releaseWakeLock() { if (wakeLock) { wakeLock.release(); wakeLock = null; } }
        function toggleStar() { const w = words[savedIndex]; if (starredWords[w.A]) delete starredWords[w.A]; else starredWords[w.A] = true; localStorage.setItem('vn_starred', JSON.stringify(starredWords)); renderWord(); }
        function toggleComplete() { let w = words[savedIndex]; if (completedWords[w.A]) { delete completedWords[w.A]; } else { completedWords[w.A] = true; showNotice('✅ 암기 끝! 숨김'); moveWord(1); } localStorage.setItem('vn_completed', JSON.stringify(completedWords)); renderWord(); }
        function toggleMainReview() { reviewMode = !reviewMode; localStorage.setItem('vn_reviewMode', reviewMode); savedIndex = 0; applyModeFilter(); }
        function toggleMainShuffle() { savedShuffle = !savedShuffle; localStorage.setItem('vn_shuffle', savedShuffle); renderWord(); }
        async function changeStudyModeMain(el) { savedStudyMode = el.value; localStorage.setItem('vn_studyMode', savedStudyMode); savedIndex = 0; await loadData(savedStudyMode); }
        function updateUsageDisplay() { document.getElementById('monthlyUsageDisplay').innerText = monthlyCharCount.toLocaleString(); document.getElementById('maxLimitDisplay').innerText = savedUnlockLimit ? "3,000,000" : "2,000,000"; }

        const cheerMessages = ["태만 오빠 & 명희 언니, 베트남어 정복이 코앞이에요! 🇻🇳", "오늘도 함께 공부하는 두 분의 열정을 응원합니다! 🔥", "두 분의 실력은 매일매일 자라고 있어요! 화이팅!", "베트남 현지인도 놀랄 실력까지, 고고싱! 🚀", "함께라서 더 즐거운 베트남어 시간! 최고예요 👍", "태만 오빠, 명희 언니! 지치지 말고 끝까지 가보자구요!", "노력은 배신하지 않아요. 두 분 진짜 멋지십니다! 🌟", "베트남 여행가서 원어민처럼 대화할 두 분을 상상해보세요!", "열공 모드 ON! 두 분의 케미가 베트남어도 이깁니다!", "포기하지 마세요, 두 분은 이미 충분히 잘하고 계세요! 💪"];

        function openSettings() { document.getElementById('settingsModal').style.display = 'block'; const randomIdx = Math.floor(Math.random() * cheerMessages.length); document.getElementById('cheerMessage').innerText = cheerMessages[randomIdx]; document.getElementById('appVolume').value = savedAppVolume; document.getElementById('wordVnCountDisplay').innerText = savedWordVnCount; document.getElementById('wordKrCountDisplay').innerText = savedWordKrCount; document.getElementById('hideVnToggle').checked = savedHideVn; document.getElementById('unlockLimitToggle').checked = savedUnlockLimit; updateUsageDisplay(); document.getElementById('sleepTimer').value = savedTimer; document.getElementById('hideKrWord').checked = savedHideKrWord; document.getElementById('delayTime').value = savedDelayTime; document.getElementById('voiceType').value = savedVoiceType; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; renderWord(); }
        function saveSettings() { savedAppVolume = document.getElementById('appVolume').value; savedTimer = document.getElementById('sleepTimer').value; savedHideKrWord = document.getElementById('hideKrWord').checked; savedHideVn = document.getElementById('hideVnToggle').checked; localStorage.setItem('vn_hideVn', savedHideVn); savedUnlockLimit = document.getElementById('unlockLimitToggle').checked; localStorage.setItem('vn_unlockLimit', savedUnlockLimit); savedDelayTime = document.getElementById('delayTime').value; savedVoiceType = document.getElementById('voiceType').value; localStorage.setItem('vn_app_volume', savedAppVolume); localStorage.setItem('vn_timer', savedTimer); localStorage.setItem('vn_hideKrWord', savedHideKrWord); localStorage.setItem('vn_delayTime', savedDelayTime); localStorage.setItem('vn_voiceType', savedVoiceType); if(isPlaying) { isSkipping = true; window.speechSynthesis.cancel(); if (currentApiAudio) { currentApiAudio.pause(); currentApiAudio = null; } } }
        function adjustVolume(targetId, amount) { const slider = document.getElementById(targetId); let newVal = parseFloat(slider.value) + amount; if (newVal > 1) newVal = 1; if (newVal < 0) newVal = 0; slider.value = newVal.toFixed(1); saveSettings(); showNotice('🔊 볼륨 조절'); }
        function changeGlobalCount(type, n) { if (type === 'wordVn') { savedWordVnCount = Math.min(99, Math.max(0, savedWordVnCount + n)); localStorage.setItem('vn_wordVnCount', savedWordVnCount); document.getElementById('wordVnCountDisplay').innerText = savedWordVnCount; } else if (type === 'wordKr') { savedWordKrCount = Math.min(99, Math.max(0, savedWordKrCount + n)); localStorage.setItem('vn_wordKrCount', savedWordKrCount); document.getElementById('wordKrCountDisplay').innerText = savedWordKrCount; } if(isPlaying) { isSkipping = true; window.speechSynthesis.cancel(); } }
        function moveWord(direction) { isSkipping = true; skipDirection = direction; window.speechSynthesis.cancel(); if (currentApiAudio) { currentApiAudio.pause(); currentApiAudio = null; } if (direction === 1) { if (savedShuffle) savedIndex = Math.floor(Math.random() * words.length); else savedIndex++; if (savedIndex >= words.length) savedIndex = 0; } else { savedIndex--; if (savedIndex < 0) savedIndex = words.length - 1; } renderWord(); }
        
        async function startSleepMode() { if (isPlaying) return; isPlaying = true; requestWakeLock(); if (sleepTimerId) clearTimeout(sleepTimerId); const timerVal = parseInt(savedTimer); if (timerVal > 0) sleepTimerId = setTimeout(() => stopSleepMode(), timerVal * 60 * 1000); while (isPlaying) { if (savedIndex >= words.length) savedIndex = 0; localStorage.setItem('vn_index', savedIndex); isSkipping = false; renderWord(); const w = words[savedIndex]; if (completedWords[w.A] && !reviewMode) { moveWord(1); continue; } if (currentPlayingIndex !== savedIndex) { currentWordRep = 0; currentExRep = 0; currentPlayingIndex = savedIndex; } let maxWordReps = Math.max(savedWordVnCount, savedWordKrCount); for (; currentWordRep < maxWordReps; currentWordRep++) { if (!isPlaying || isSkipping) break; if (currentWordRep < savedWordVnCount) { await speakText(w.A, 'vi-VN'); if (!isPlaying || isSkipping) break; } if (currentWordRep < savedWordKrCount && !savedHideKrWord) { await speakText(w.C, 'ko-KR'); if (!isPlaying || isSkipping) break; } let delayMs = parseInt(savedDelayTime); for(let ms=0; ms<delayMs; ms+=100) { if(!isPlaying || isSkipping) break; await new Promise(r => setTimeout(r, 100)); } } if (!isPlaying || isSkipping) continue; if (w.D) { let maxExReps = 1; for (; currentExRep < maxExReps; currentExRep++) { if (!isPlaying || isSkipping) break; await speakText(w.D, 'vi-VN'); if (!isPlaying || isSkipping) break; await speakText(w.F, 'ko-KR'); if (!isPlaying || isSkipping) break; let delayMs = parseInt(savedDelayTime); for(let ms=0; ms<delayMs; ms+=100) { if(!isPlaying || isSkipping) break; await new Promise(r => setTimeout(r, 100)); } } } if (!isPlaying || isSkipping) continue; currentWordRep = 0; currentExRep = 0; moveWord(1); } }
        function stopSleepMode() { isPlaying = false; window.speechSynthesis.cancel(); if (currentApiAudio) { currentApiAudio.pause(); currentApiAudio = null; } releaseWakeLock(); renderWord(); }

        function playIOSVoice(text, safeResolve) { const msg = new SpeechSynthesisUtterance(text); msg.lang = 'vi-VN'; msg.volume = parseFloat(savedAppVolume); msg.rate = parseFloat(localStorage.getItem('vn_voiceRate') || '0.9'); let voices = window.speechSynthesis.getVoices(); let vnVoices = voices.filter(v => v.lang.startsWith('vi')); if(vnVoices.length > 0) { if(savedVoiceType.includes('-C') || savedVoiceType.includes('-D')) { let hcmVoice = vnVoices.find(v => v.name.toLowerCase().includes('ho chi minh') || v.name.toLowerCase().includes('south')); msg.voice = hcmVoice || vnVoices[0]; } else { let hanoiVoice = vnVoices.find(v => v.name.toLowerCase().includes('ha noi') || v.name.toLowerCase().includes('north')); msg.voice = hanoiVoice || vnVoices[0]; } } msg.onend = safeResolve; msg.onerror = safeResolve; window.speechSynthesis.speak(msg); const checker = setInterval(() => { if (!isPlaying || isSkipping) { clearInterval(checker); window.speechSynthesis.cancel(); safeResolve(); } }, 50); }
        function speakText(text, lang) { return new Promise(async resolve => { if(!text || isSkipping || !isPlaying) return resolve(); let isResolved = false; const safeResolve = () => { if(!isResolved) { isResolved = true; resolve(); } }; if (lang === 'ko-KR') { window.speechSynthesis.cancel(); setTimeout(() => { if(!isPlaying || isSkipping) return safeResolve(); const msg = new SpeechSynthesisUtterance(text); msg.lang = lang; msg.volume = parseFloat(savedAppVolume); msg.rate = 0.9; let backupTimer = setTimeout(() => { safeResolve(); }, Math.max(1500, text.length * 200 + 1000)); msg.onend = () => { clearTimeout(backupTimer); safeResolve(); }; msg.onerror = () => { clearTimeout(backupTimer); safeResolve(); }; window.speechSynthesis.speak(msg); if (navigator.userAgent.toLowerCase().indexOf('chrome') > -1) { window.speechSynthesis.pause(); window.speechSynthesis.resume(); } }, 100); } else if (lang === 'vi-VN') { if (savedHideVn) return playIOSVoice(text, safeResolve); if (monthlyCharCount + text.length > 2950000) return playIOSVoice(text, safeResolve); if (!savedUnlockLimit && (monthlyCharCount + text.length > 1950000)) return playIOSVoice(text, safeResolve); const API_KEY = 'AIzaSyCNWYad51NeCEiU7uf6PRyXFUKYur-fDa0'; const requestBody = { input: { text: text }, voice: { languageCode: 'vi-VN', name: savedVoiceType }, audioConfig: { audioEncoding: 'MP3', speakingRate: 0.9, pitch: 0.0 } }; try { const response = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${API_KEY}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody) }); if (!response.ok) return playIOSVoice(text, safeResolve); monthlyCharCount += text.length; localStorage.setItem('vn_monthly_chars', monthlyCharCount); const data = await response.json(); if (currentApiAudio) { currentApiAudio.pause(); currentApiAudio = null; } currentApiAudio = new Audio("data:audio/mp3;base64," + data.audioContent); currentApiAudio.volume = parseFloat(savedAppVolume); currentApiAudio.onended = safeResolve; currentApiAudio.onerror = safeResolve; await currentApiAudio.play(); } catch (e) { return playIOSVoice(text, safeResolve); } } }); }
        function getTodayStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function openCompletedList() { const container = document.getElementById('compListContainer'); container.innerHTML = ''; Object.keys(completedWords).forEach(wordA => { const item = masterWordList.find(w => w.A.trim() === wordA.trim()) || { B: '?', C: '?' }; container.innerHTML += `<div class="comp-row"><div class="c-vn">${wordA}</div><div class="c-pron">${item.B}</div><div class="c-mean">${item.C}</div><div class="c-del"><button onclick="uncheckWord('${wordA}')" style="background:var(--accent-red); border:none; color:#fff; border-radius:5px; padding:6px 10px; font-size:10px;">X</button></div></div>`; }); document.getElementById('compModal').style.display = 'block'; }
        function closeModal() { document.getElementById('compModal').style.display = 'none'; renderWord(); }
        function uncheckWord(wordA) { delete completedWords[wordA]; localStorage.setItem('vn_completed', JSON.stringify(completedWords)); openCompletedList(); }
        function exportData() { const data = { completed: completedWords, starred: starredWords, time: dailyTime, hits: hitCounts }; const blob = new Blob([JSON.stringify(data)], { type: 'text/plain' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup.txt`; a.click(); }
        function importData() { document.getElementById('importFile').click(); }
        function processFile(el) { const reader = new FileReader(); reader.onload = e => { const data = JSON.parse(e.target.result); localStorage.setItem('vn_completed', JSON.stringify(data.completed)); localStorage.setItem('vn_starred', JSON.stringify(data.starred)); localStorage.setItem('vn_daily_time', JSON.stringify(data.time)); location.reload(); }; reader.readAsText(el.files[0]); }
    </script>
</body>
