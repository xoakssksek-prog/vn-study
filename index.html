<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>명희의 수면 베트남어 마스터</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #1a1a2e; color: white; padding: 20px; margin: 0; }
        .card { background: #16213e; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); max-width: 500px; margin: auto; }
        .vn { font-size: 45px; font-weight: bold; color: #4ecca3; margin-bottom: 5px; }
        .pron { font-size: 25px; color: #f2a365; margin-bottom: 5px; }
        .kr { font-size: 22px; color: #eee; margin-bottom: 20px; }
        .ex-vn { font-size: 25px; color: #4ecca3; margin-top: 15px; }
        .ex-pron { font-size: 20px; color: #f2a365; }
        .ex-kr { font-size: 18px; color: #ccc; margin-bottom: 15px; }
        
        .controls-row { display: flex; justify-content: space-between; align-items: center; background: #0f3460; padding: 10px; border-radius: 10px; margin-top: 15px; }
        .nav-btn { background: #3a4750; color: white; border: none; padding: 10px 15px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; flex: 1; margin: 0 5px; }
        .nav-btn:active { background: #5a6770; }
        
        .count-controls { display: flex; align-items: center; gap: 10px; }
        .count-controls button { font-size: 20px; width: 35px; height: 35px; border: none; border-radius: 8px; background: #4ecca3; color: #1a1a2e; font-weight: bold; cursor: pointer; }
        .count-display { font-size: 18px; font-weight: bold; color: white; min-width: 40px; text-align: center; }
        
        .btn-complete { padding: 10px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: #ffbc00; color: #1a1a2e; width: 100%; margin-top: 10px;}
        .completed-text { color: #ffbc00; font-size: 18px; font-weight: bold; margin-bottom: 10px; background: rgba(255, 188, 0, 0.2); padding: 5px; border-radius: 8px; }
        
        .play-btn { font-size: 20px; padding: 15px; border: none; border-radius: 10px; cursor: pointer; background: #e94560; color: white; font-weight: bold; width: 100%; margin-top: 20px;}
        .status { margin-top: 15px; font-size: 16px; color: #888; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; padding-top: 50px; }
        .modal-content { background: #16213e; margin: auto; width: 90%; max-width: 400px; border-radius: 15px; padding: 20px; text-align: left; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-title { font-size: 20px; font-weight: bold; color: #4ecca3; }
        .close-btn { background: #e94560; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .comp-item { display: flex; justify-content: space-between; align-items: center; background: #0f3460; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .comp-word { font-size: 18px; font-weight: bold; color: white; }
        .comp-mean { font-size: 14px; color: #ccc; }
        .uncheck-btn { background: #ffbc00; border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .list-btn { background: transparent; color: #4ecca3; border: 1px solid #4ecca3; padding: 10px; border-radius: 10px; width: 100%; font-size: 16px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="blackoutOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: #444; cursor: pointer;" onclick="toggleBlackout()">
        <p style="font-size: 20px;">절전 모드 작동 중</p>
        <p style="font-size: 14px;">화면을 터치하면 다시 켜집니다</p>
    </div>

    <div id="app" class="card">
        <p>단어장 데이터를 불러오는 중입니다...</p>
    </div>

    <div id="compModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">✅ 완료된 항목 목록</div>
                <button class="close-btn" onclick="closeModal()">닫기</button>
            </div>
            <div id="compListContainer"></div>
        </div>
    </div>

    <script>
        const sheetId = '1AiQwqgLg_XBHTiHWZXY0n2qN2Mz4NfIVcR2MxRfqkOc';
        
        const sheetNames = {
            '단어': '단어',
            '문장표현': '문장표현',
            '문법': '문법'
        };

        let words = [];
        let isPlaying = false;
        let isSkipping = false;
        let skipDirection = 1; 
        let sleepTimerId = null;

        let savedIndex = parseInt(localStorage.getItem('vn_index') || '0');
        let completedWords = JSON.parse(localStorage.getItem('vn_completed') || '{}');
        let savedVoiceRate = localStorage.getItem('vn_voiceRate') || '0.9';
        let savedGapTime = localStorage.getItem('vn_gapTime') || '1500';
        let savedWordCount = parseInt(localStorage.getItem('vn_wordCount') || '3');
        let savedSentenceCount = parseInt(localStorage.getItem('vn_sentenceCount') || '1');
        let savedTimer = localStorage.getItem('vn_timer') || '0';
        let savedShuffle = localStorage.getItem('vn_shuffle') === 'true';
        let savedStudyMode = localStorage.getItem('vn_studyMode') || '단어'; 

        loadData(savedStudyMode);

        async function loadData(mode) {
            words = [];
            document.getElementById('app').innerHTML = `<p>${mode} 시트 연동 중...</p>`;
            
            try {
                if (mode === '전체랜덤') {
                    for (const name in sheetNames) {
                        const data = await fetchSheetByName(sheetNames[name]);
                        words = words.concat(data);
                    }
                } else {
                    words = await fetchSheetByName(sheetNames[mode]);
                }
            } catch (e) {
                console.error(e);
            }

            if (words.length > 0) {
                if (savedIndex >= words.length) savedIndex = 0;
                renderWord();
            } else {
                document.getElementById('app').innerHTML = `<p style="color:red;">'${mode}' 데이터를 불러오지 못했습니다.<br>시트 이름이 정확한지 확인해 주세요.</p>`;
            }
        }

        async function fetchSheetByName(name) {
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
            const res = await fetch(url);
            const data = await res.text();
            const rows = data.split('\n').slice(1);
            return rows.map(row => {
                const cols = row.split('","').map(c => c.replace(/(^"|"$)/g, ''));
                return {
                    A: cols[0] || '', B: cols[1] || '', C: cols[2] || '',
                    D: cols[3] || '', E: cols[4] || '', F: cols[5] || ''
                };
            }).filter(w => w.A.trim() !== '');
        }

        function changeStudyMode() {
            const mode = document.getElementById('studyMode').value;
            savedStudyMode = mode;
            localStorage.setItem('vn_studyMode', mode);
            savedIndex = 0; 
            localStorage.setItem('vn_index', '0');
            loadData(mode);
        }

        function saveSettings() {
            savedVoiceRate = document.getElementById('voiceRate').value;
            savedGapTime = document.getElementById('gapTime').value;
            savedTimer = document.getElementById('sleepTimer').value;
            savedShuffle = document.getElementById('shuffleMode').checked;
            
            localStorage.setItem('vn_voiceRate', savedVoiceRate);
            localStorage.setItem('vn_gapTime', savedGapTime);
            localStorage.setItem('vn_timer', savedTimer);
            localStorage.setItem('vn_shuffle', savedShuffle);
        }

        function changeGlobalCount(type, n) {
            if (type === 'word') {
                savedWordCount = Math.max(0, Math.min(100, savedWordCount + n));
                localStorage.setItem('vn_wordCount', savedWordCount);
                if (document.getElementById('wordCountDisplay')) {
                    document.getElementById('wordCountDisplay').innerText = savedWordCount + '번';
                }
            } else if (type === 'sentence') {
                savedSentenceCount = Math.max(0, Math.min(100, savedSentenceCount + n));
                localStorage.setItem('vn_sentenceCount', savedSentenceCount);
                if (document.getElementById('sentenceCountDisplay')) {
                    document.getElementById('sentenceCountDisplay').innerText = savedSentenceCount + '번';
                }
            }
        }

        function renderWord() {
            if (words.length === 0) return;
            const w = words[savedIndex];
            const isCompleted = completedWords[w.A];

            let html = '<div class="status">[' + savedStudyMode + '] ' + (savedIndex + 1) + ' / ' + words.length + ' 항목</div>';
            
            if (isCompleted) {
                // 3초 대기 문구 삭제
                html += '<div class="completed-text">✅ 완료된 항목</div>';
            }

            html += '<div class="vn">' + w.A + '</div>';
            if (w.B) html += '<div class="pron">[ ' + w.B + ' ]</div>';
            html += '<div class="kr">' + w.C + '</div>';
            
            if (w.D || w.F) {
                html += '<hr style="border:1px solid #333;">';
                html += '<div class="ex-vn">' + w.D + '</div>';
                if (w.E) html += '<div class="ex-pron">[ ' + w.E + ' ]</div>';
                html += '<div class="ex-kr">' + w.F + '</div>';
            }

            // 이전/다음 버튼
            html += '<div class="controls-row">';
            html += '<button class="nav-btn" onclick="moveWord(-1)">◀ 뒤로</button>';
            html += '<button class="nav-btn" onclick="moveWord(1)">넘기기 ▶</button>';
            html += '</div>';

            // 1. 학습 완료하기 & 완료 목록 보기 버튼을 반반 나누어 배치
            html += '<div style="display: flex; gap: 10px; margin-top: 15px;">';
            html += '<button class="btn-complete" style="margin-top: 0; flex: 1;" onclick="toggleComplete()">' + (isCompleted ? '❌ 완료 해제' : '✅ 학습 완료하기') + '</button>';
            if (!isPlaying) {
                html += '<button class="list-btn" style="margin-top: 0; flex: 1;" onclick="openModal()">📋 완료 목록 보기</button>';
            } else {
                html += '<button class="list-btn" style="margin-top: 0; flex: 1; color: #e94560; border-color: #e94560;" onclick="stopSleepMode()">⏹ 학습 종료</button>';
            }
            html += '</div>';

            // 2. 수면 학습 시작 버튼을 바로 아래 배치
            if (!isPlaying) {
                html += '<button id="playBtn" class="play-btn" style="margin-top: 10px;" onclick="startSleepMode()">🌙 수면 학습 시작</button>';
            } else {
                html += '<button class="play-btn" style="background: #333; margin-top: 10px;" onclick="toggleBlackout()">💡 화면 끄기 (절전)</button>';
            }

            // 3. 기존 하단에 있던 설정 영역 시작
            html += '<div style="background: #0f3460; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left;">';
            
            html += '<label style="display: block; font-size: 14px; margin-bottom: 15px; color: #4ecca3; font-weight:bold;">📚 엑셀 시트 선택: ';
            html += '<select id="studyMode" onchange="changeStudyMode()" style="width: 100%; padding: 8px; font-size: 16px; border-radius: 5px; border: none; background: #1a1a2e; color: white; margin-top: 5px;">';
            html += '<option value="단어">1. 단어 시트 학습</option><option value="문장표현">2. 문장표현 시트 학습</option><option value="문법">3. 문법 시트 학습</option><option value="전체랜덤">4. 모든 시트 랜덤</option></select></label>';

            html += '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 15px;">';
            html += '<label style="font-size: 14px; color: #ccc; display: flex; align-items: center; gap: 5px;"><input type="checkbox" id="shuffleMode" onchange="saveSettings()"> 🔀 랜덤 재생</label>';
            html += '<label style="font-size: 14px; color: #ccc;">⏰ 타이머: ';
            html += '<select id="sleepTimer" onchange="saveSettings()" style="padding: 5px; border-radius: 5px; background: #1a1a2e; color: white; border: none;">';
            html += '<option value="0">끄기</option><option value="15">15분</option><option value="30">30분</option><option value="60">60분</option><option value="120">120분</option>';
            html += '</select></label></div>';

            html += '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">';
            html += '<span style="font-size: 14px; color: #ccc;">🔁 본문 반복:</span>';
            html += '<div class="count-controls"><button onclick="changeGlobalCount(\'word\', -1)">-</button><span class="count-display" id="wordCountDisplay">' + savedWordCount + '번</span><button onclick="changeGlobalCount(\'word\', 1)">+</button></div>';
            html += '</div>';

            html += '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">';
            html += '<span style="font-size: 14px; color: #ccc;">🔁 예문 반복:</span>';
            html += '<div class="count-controls"><button onclick="changeGlobalCount(\'sentence\', -1)">-</button><span class="count-display" id="sentenceCountDisplay">' + savedSentenceCount + '번</span><button onclick="changeGlobalCount(\'sentence\', 1)">+</button></div>';
            html += '</div>';

            html += '<label style="display: block; font-size: 14px; margin-bottom: 10px; color: #ccc;">🗣️ 발음 속도: ';
            html += '<select id="voiceRate" onchange="saveSettings()" style="width: 100%; padding: 8px; font-size: 16px; border-radius: 5px; border: none; background: #1a1a2e; color: white; margin-top: 5px;">';
            html += '<option value="0.6">저속</option><option value="0.9">일반</option><option value="1.3">고속</option></select></label>';
            
            html += '<label style="display: block; font-size: 14px; margin-bottom: 5px; color: #ccc;">⏳ 공백 딜레이: ';
            html += '<select id="gapTime" onchange="saveSettings()" style="width: 100%; padding: 8px; font-size: 16px; border-radius: 5px; border: none; background: #1a1a2e; color: white; margin-top: 5px;">';
            html += '<option value="0">대기 없음</option><option value="1500">표준</option><option value="3000">지연</option></select></label>';
            html += '</div>';

            document.getElementById('app').innerHTML = html;

            if(document.getElementById('voiceRate')) document.getElementById('voiceRate').value = savedVoiceRate;
            if(document.getElementById('gapTime')) document.getElementById('gapTime').value = savedGapTime;
            if(document.getElementById('sleepTimer')) document.getElementById('sleepTimer').value = savedTimer;
            if(document.getElementById('shuffleMode')) document.getElementById('shuffleMode').checked = savedShuffle;
            if(document.getElementById('studyMode')) document.getElementById('studyMode').value = savedStudyMode;
        }

        function toggleBlackout() {
            const overlay = document.getElementById('blackoutOverlay');
            overlay.style.display = (overlay.style.display === 'none') ? 'flex' : 'none';
        }

        function stopSleepMode() {
            isPlaying = false;
            isSkipping = true;
            window.speechSynthesis.cancel();
            if (sleepTimerId) clearTimeout(sleepTimerId);
            renderWord();
        }

        function toggleComplete() {
            let w = words[savedIndex];
            if (completedWords[w.A]) {
                delete completedWords[w.A];
                localStorage.setItem('vn_completed', JSON.stringify(completedWords));
                renderWord(); // 해제 시에는 화면 유지
            } else {
                completedWords[w.A] = true;
                localStorage.setItem('vn_completed', JSON.stringify(completedWords));
                moveWord(1); // 학습 완료 체크 시 즉시 다음 단어로 이동
            }
        }

        function moveWord(direction) {
            isSkipping = true;
            skipDirection = direction;
            window.speechSynthesis.cancel(); 
            if (!isPlaying) {
                savedIndex += direction;
                if (savedIndex < 0) savedIndex = words.length - 1;
                if (savedIndex >= words.length) savedIndex = 0;
                renderWord();
            }
        }

        function speakText(text, lang) {
            return new Promise(resolve => {
                if (!text || text.trim() === '' || isSkipping) return resolve();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = lang; 
                msg.rate = parseFloat(savedVoiceRate); 
                msg.onend = resolve; msg.onerror = resolve; 
                window.speechSynthesis.speak(msg);
                setTimeout(resolve, 8000);
            });
        }

        async function smartDelay(ms) {
            if (ms <= 0) return; 
            let waited = 0;
            while (waited < ms && !isSkipping && isPlaying) {
                await new Promise(r => setTimeout(r, 100));
                waited += 100;
            }
        }

        function advanceIndex() {
            if (!isSkipping) {
                if (savedShuffle && words.length > 1) {
                    let nextIndex = savedIndex;
                    while (nextIndex === savedIndex) {
                        nextIndex = Math.floor(Math.random() * words.length);
                    }
                    savedIndex = nextIndex;
                } else {
                    savedIndex++;
                }
            } else {
                savedIndex += skipDirection;
            }
        }

        async function startSleepMode() {
            if (isPlaying) return;
            isPlaying = true;
            if (sleepTimerId) clearTimeout(sleepTimerId);
            const timerVal = parseInt(savedTimer);
            if (timerVal > 0) {
                sleepTimerId = setTimeout(() => {
                    stopSleepMode();
                }, timerVal * 60 * 1000);
            }
            while (isPlaying) {
                if (savedIndex >= words.length) savedIndex = 0;
                if (savedIndex < 0) savedIndex = words.length - 1;
                localStorage.setItem('vn_index', savedIndex);
                isSkipping = false;
                renderWord(); 
                const w = words[savedIndex];
                const currentGap = parseInt(savedGapTime); 
                
                // 완료된 단어는 대기 시간 없이 즉시 통과 (브라우저 과부하 방지용 10ms만 대기)
                if (completedWords[w.A]) {
                    await new Promise(r => setTimeout(r, 10)); 
                    advanceIndex();
                    continue;
                }
                
                if (savedWordCount > 0) {
                    for (let i = 0; i < savedWordCount; i++) {
                        if (!isPlaying || isSkipping) break;
                        await speakText(w.A, 'vi-VN'); 
                        if (!isPlaying || isSkipping) break;
                        await speakText(w.C, 'ko-KR'); 
                        await smartDelay(currentGap); 
                    }
                }
                if (!isPlaying || isSkipping) { advanceIndex(); continue; }
                if (w.D && w.F && savedSentenceCount > 0) {
                    for (let i = 0; i < savedSentenceCount; i++) {
                        if (!isPlaying || isSkipping) break;
                        await speakText(w.D, 'vi-VN'); 
                        if (!isPlaying || isSkipping) break;
                        await speakText(w.F, 'ko-KR'); 
                        await smartDelay(currentGap);
                    }
                }
                if (!isPlaying || isSkipping) { advanceIndex(); continue; }
                await smartDelay(1000); 
                advanceIndex();
            }
        }

        function openModal() {
            const container = document.getElementById('compListContainer');
            container.innerHTML = '';
            const compKeys = Object.keys(completedWords);
            if(compKeys.length === 0) {
                container.innerHTML = '<p style="color:#888;">아직 완료된 항목이 없습니다.</p>';
            } else {
                compKeys.forEach(wordA => {
                    const wordData = words.find(w => w.A === wordA);
                    const mean = wordData ? wordData.C : '';
                    container.innerHTML += `
                        <div class="comp-item" id="item_${wordA}">
                            <div><div class="comp-word">${wordA}</div><div class="comp-mean">${mean}</div></div>
                            <button class="uncheck-btn" onclick="uncheckWord('${wordA}')">해제</button>
                        </div>`;
                });
            }
            document.getElementById('compModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('compModal').style.display = 'none'; renderWord(); }
        function uncheckWord(wordA) { delete completedWords[wordA]; localStorage.setItem('vn_completed', JSON.stringify(completedWords)); const el = document.getElementById('item_' + wordA); if(el) el.style.display = 'none'; }
    </script>
</body>
</html>
