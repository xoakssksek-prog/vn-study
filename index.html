<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>명희의 수면 베트남어 마스터</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #1a1a2e; }
        body { font-family: sans-serif; text-align: center; color: white; width: 100%; display: flex; flex-direction: column; }
        
        .card { background: #16213e; width: 100%; height: 100dvh; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        .content-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; width: 100%; }
        
        .vn { font-weight: bold; color: #4ecca3; margin-bottom: 5px; word-break: break-word; line-height: 1.2; }
        .pron { font-size: 22px; color: #f2a365; margin-bottom: 5px; }
        .kr { font-size: 22px; color: #eee; margin-bottom: 10px; }
        .ex-vn { color: #4ecca3; margin-top: 10px; word-break: break-word; line-height: 1.2; }
        .ex-pron { font-size: 18px; color: #f2a365; }
        .ex-kr { font-size: 16px; color: #ccc; margin-bottom: 10px; }
        
        .arrow-btn { background: none; border: none; color: rgba(255, 255, 255, 0.15); font-size: 45px; cursor: pointer; padding: 0 10px; user-select: none; -webkit-tap-highlight-color: transparent; }
        .arrow-btn:active { color: rgba(78, 204, 163, 0.5); }

        .bottom-controls { width: 100%; padding-bottom: 10px; }
        
        /* 버튼 공통 높이 유지 */
        .btn-complete, .list-btn, .play-btn, .sheet-select { 
            height: 55px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-sizing: border-box;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            border: none;
            margin: 0;
            text-align: center;
        }

        .btn-complete { background: #ffbc00; color: #1a1a2e; font-weight: bold; }
        .list-btn { background: transparent; color: #4ecca3; border: 1px solid #4ecca3; }
        .sheet-select { background: #1a1a2e; color: #4ecca3; border: 1px solid #4ecca3; padding: 0 5px; appearance: none; -webkit-appearance: none; text-align-last: center; }
        .play-btn { background: #e94560; color: white; font-weight: bold; font-size: 20px; margin-bottom: 10px; height: 60px; }
        
        .status { font-size: 14px; color: #888; margin-bottom: 10px; }
        .nav-btn { background: #3a4750; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; padding-top: 20px; }
        .modal-content { background: #16213e; margin: auto; width: 95%; max-width: 450px; border-radius: 15px; padding: 15px; text-align: left; box-sizing: border-box; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-title { font-size: 18px; font-weight: bold; color: #4ecca3; text-align: center; flex: 1; }
        .close-btn { background: #e94560; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }

        .report-bar-container { display: flex; align-items: flex-end; justify-content: space-around; height: 60px; margin-top: 10px; background: #1a1a2e; padding: 10px; border-radius: 8px; }
        .report-bar-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .report-bar { width: 15px; background: #4ecca3; border-radius: 3px 3px 0 0; min-height: 2px; }
        .report-day { font-size: 9px; color: #777; }
        .star-btn { font-size: 32px; background: none; border: none; cursor: pointer; color: #444; margin-bottom: 5px; transition: 0.2s; }
        .star-btn.active { color: #ffbc00; text-shadow: 0 0 10px rgba(255, 188, 0, 0.5); }

        .cal-grid { display: grid !important; grid-template-columns: repeat(7, 1fr) !important; gap: 4px; background: #1a1a2e; padding: 8px; border-radius: 10px; width: 100%; box-sizing: border-box; }
        .cal-header { font-size: 11px; font-weight: bold; color: #4ecca3; text-align: center; padding: 5px 0; background: #0f3460; border-radius: 4px; }
        .cal-day { background: #16213e; border-radius: 4px; aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1px solid #222; min-height: 45px; }
        .cal-date { font-size: 10px; color: #aaa; position: absolute; top: 2px; left: 4px; }
        .cal-medal { font-size: 18px; margin-top: 5px; }
        .stats-panel { background: #0f3460; padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 13px; color: #ccc; }
        .stats-val { color: white; font-weight: bold; float: right; }
        .count-controls { display: flex; align-items: center; gap: 8px; }
        .count-controls button { width: 30px; height: 30px; border-radius: 5px; border: none; background: #4ecca3; cursor: pointer; }

        .quick-settings { display: flex; justify-content: space-around; align-items: center; margin-top: 8px; font-size: 14px; color: #aaa; }
        .quick-settings label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="blackoutOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: #444; cursor: pointer;" onclick="toggleBlackout()">
        <p style="font-size: 20px;">저전력 모드 작동 중</p>
        <p style="font-size: 14px;">화면을 터치하면 다시 켜집니다</p>
    </div>

    <div id="app" style="height: 100%;">
        <div class="card"><p>데이터 로딩 중...</p></div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">⚙️ 설정</div>
                <button class="close-btn" onclick="closeSettings()">닫기</button>
            </div>
            <div style="background: #0f3460; padding: 15px; border-radius: 10px; text-align: left;">
                <button class="btn-complete" style="margin-bottom: 20px; font-size: 15px;" onclick="openCompletedList()">📋 완료 목록 보기</button>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <label style="font-size: 14px; color: #ccc;">⏰ 타이머: 
                        <select id="sleepTimer" onchange="saveSettings()" style="padding: 5px; border-radius: 5px; background: #1a1a2e; color: white; border: none;">
                            <option value="0">끄기</option><option value="15">15분</option><option value="30">30분</option><option value="60">60분</option><option value="120">120분</option><option value="180">180분</option><option value="240">240분</option>
                        </select>
                    </label>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span>🔁 본문 반복:</span>
                    <div class="count-controls">
                        <label style="font-size: 11px; color: #aaa; margin-right: 5px;"><input type="checkbox" id="hideKrWord" onchange="saveSettings()"> 한글해제</label>
                        <button onclick="changeGlobalCount('word', -1)">-</button><span id="wordCountDisplay">3번</span><button onclick="changeGlobalCount('word', 1)">+</button>
                    </div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <span>🔁 예문 반복:</span>
                    <div class="count-controls">
                        <label style="font-size: 11px; color: #aaa; margin-right: 5px;"><input type="checkbox" id="hideKrEx" onchange="saveSettings()"> 한글해제</label>
                        <button onclick="changeGlobalCount('sentence', -1)">-</button><span id="sentenceCountDisplay">1번</span><button onclick="changeGlobalCount('sentence', 1)">+</button>
                    </div>
                </div>
                <label style="display: block; font-size: 14px; margin-bottom: 10px;">🗣️ 발음 속도: 
                    <select id="voiceRate" onchange="saveSettings()" style="width: 100%; padding: 12px; border-radius: 5px; border: none; background: #1a1a2e; color: white;">
                        <option value="0.6">저속</option><option value="0.9">일반</option><option value="1.3">고속</option>
                    </select>
                </label>
                <label style="display: block; font-size: 14px; margin-bottom: 10px;">⏳ 대기 시간: 
                    <select id="delayTime" onchange="saveSettings()" style="width: 100%; padding: 12px; border-radius: 5px; border: none; background: #1a1a2e; color: white;">
                        <option value="0">없음</option><option value="1000">표준(1초)</option><option value="2000">조금 느림(2초)</option><option value="3000">느림(3초)</option>
                    </select>
                </label>
            </div>
        </div>
    </div>

    <div id="calendarModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="nav-btn" style="flex: 0 0 40px; padding: 5px;" onclick="changeMonth(-1)">◀</button>
                <div class="modal-title" id="calTitle">학습 시간 보기</div>
                <button class="nav-btn" style="flex: 0 0 40px; padding: 5px;" onclick="changeMonth(1)">▶</button>
                <button class="close-btn" style="margin-left: 10px;" onclick="closeCalendar()">닫기</button>
            </div>
            <div id="calendarGrid" class="cal-grid"></div>
            <div class="stats-panel">
                <div style="margin-bottom: 10px; font-weight: bold; color: #4ecca3;">📊 최근 7일 학습 리포트</div>
                <div id="weeklyBarChart" class="report-bar-container"></div>
                <hr style="border: 0.2px solid #333; margin: 15px 0;">
                <div style="margin-bottom: 5px;">⌛ 오늘의 학습 <span class="stats-val" id="statToday" style="color: #ffbc00;">0분</span></div>
                <div style="margin-bottom: 5px;">📅 이달의 학습 <span class="stats-val" id="statMonth" style="color: #4ecca3;">0분</span></div>
                <div>✅ 학습 완료 단어 <span class="stats-val" id="statWords" style="color: #ffbc00;">0개</span></div>
            </div>
        </div>
    </div>

    <div id="compModal" class="modal"><div class="modal-content"><div class="modal-header"><div class="modal-title">✅ 완료 목록</div><button class="close-btn" onclick="closeModal()">닫기</button></div><div id="compListContainer"></div></div></div>

    <script>
        const sheetId = '1AiQwqgLg_XBHTiHWZXY0n2qN2Mz4NfIVcR2MxRfqkOc';
        const sheetNames = { '단어': '단어', '문장표현': '문장표현', '문법': '문법' };
        let allWords = []; let words = []; let isPlaying = false; let isSkipping = false; let skipDirection = 1; let sleepTimerId = null;
        let savedIndex = 0; let completedWords = {}; let starredWords = {}; let dailyTime = {}; let wakeLock = null;
        
        try { savedIndex = parseInt(localStorage.getItem('vn_index') || '0'); } catch(e) {}
        try { completedWords = JSON.parse(localStorage.getItem('vn_completed') || '{}'); } catch(e) { completedWords = {}; }
        try { starredWords = JSON.parse(localStorage.getItem('vn_starred') || '{}'); } catch(e) { starredWords = {}; }
        try { dailyTime = JSON.parse(localStorage.getItem('vn_daily_time') || '{}'); } catch(e) { dailyTime = {}; }

        let savedVoiceRate = localStorage.getItem('vn_voiceRate') || '0.9';
        let savedWordCount = parseInt(localStorage.getItem('vn_wordCount') || '3');
        let savedSentenceCount = parseInt(localStorage.getItem('vn_sentenceCount') || '1');
        let savedTimer = localStorage.getItem('vn_timer') || '0';
        let savedShuffle = localStorage.getItem('vn_shuffle') === 'true';
        let savedStudyMode = localStorage.getItem('vn_studyMode') || '단어'; 
        let savedDelayTime = localStorage.getItem('vn_delayTime') || '1000';
        let savedHideKrWord = localStorage.getItem('vn_hideKrWord') === 'true';
        let savedHideKrEx = localStorage.getItem('vn_hideKrEx') === 'true';
        let reviewMode = localStorage.getItem('vn_reviewMode') === 'true';
        let currentCalDate = new Date(); 

        loadData(savedStudyMode);

        setInterval(() => {
            if (isPlaying) {
                const todayStr = getTodayStr(new Date());
                dailyTime[todayStr] = (dailyTime[todayStr] || 0) + 10;
                localStorage.setItem('vn_daily_time', JSON.stringify(dailyTime));
            }
        }, 10000);

        async function requestWakeLock() { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
        function releaseWakeLock() { if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); } }

        async function loadData(mode) {
            allWords = []; try {
                if (mode === '전체랜덤') {
                    for (const name in sheetNames) { const data = await fetchSheetByName(sheetNames[name]); allWords = allWords.concat(data); }
                } else { allWords = await fetchSheetByName(sheetNames[mode]); }
            } catch (e) {}
            applyModeFilter();
        }

        function applyModeFilter() {
            if (reviewMode) {
                words = allWords.filter(w => starredWords[w.A]);
                if (words.length === 0) { 
                    alert("별표 표시한 단어가 없습니다! 일반 모드로 전환합니다."); 
                    reviewMode = false; localStorage.setItem('vn_reviewMode', 'false');
                    words = allWords; 
                }
            } else { words = allWords; }
            if (savedIndex >= words.length) savedIndex = 0;
            renderWord();
        }

        async function fetchSheetByName(name) {
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
            const res = await fetch(url); const data = await res.text();
            const rows = data.split('\n').slice(1);
            return rows.map(row => {
                const cols = row.split('","').map(c => c.replace(/(^"|"$)/g, ''));
                return { A: cols[0] || '', B: cols[1] || '', C: cols[2] || '', D: cols[3] || '', E: cols[4] || '', F: cols[5] || '' };
            }).filter(w => w.A.trim() !== '');
        }

        function renderWord() {
            if (words.length === 0) return;
            const w = words[savedIndex]; 
            const isCompleted = completedWords[w.A];
            const isStarred = starredWords[w.A];
            
            let vnSize = w.A.length > 15 ? '30px' : (w.A.length > 8 ? '40px' : '50px');
            let exVnSize = (w.D && w.D.length > 40) ? '20px' : '26px';

            let html = '<div class="card">';
            html += '<div class="status">' + (reviewMode ? '⭐ 복습모드' : '[' + savedStudyMode + ']') + ' ' + (savedIndex + 1) + ' / ' + words.length + '</div>';
            html += '<div class="content-wrap">';
            
            html += `<button class="star-btn ${isStarred ? 'active' : ''}" onclick="toggleStar()">${isStarred ? '★' : '☆'}</button>`;
            if (isCompleted) html += '<div style="color:#ffbc00; font-weight:bold; font-size:14px; margin-bottom:5px;">✅ 완료된 항목</div>';
            
            html += '<div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">';
            html += '<button class="arrow-btn" onclick="moveWord(-1)">◀</button>';
            html += '<div class="vn" style="font-size:' + vnSize + '; flex: 1;">' + w.A + '</div>';
            html += '<button class="arrow-btn" onclick="moveWord(1)">▶</button>';
            html += '</div>';

            if (w.B) html += '<div class="pron">[ ' + w.B + ' ]</div>';
            html += '<div class="kr">' + w.C + '</div>';
            
            if (w.D || w.F) {
                html += '<hr style="border:0.5px solid #333; width:80%; margin: 10px auto;">';
                html += '<div class="ex-vn" style="font-size:' + exVnSize + ';">' + w.D + '</div>';
                if (w.E) html += '<div class="ex-pron">[ ' + w.E + ' ]</div>';
                html += '<div class="ex-kr">' + w.F + '</div>';
            }
            html += '</div>';

            html += '<div class="bottom-controls">';
            if (!isPlaying) { html += '<button class="play-btn" onclick="startSleepMode()">🌙 수면 학습 시작</button>'; }
            else { html += '<button class="play-btn" style="background: #e94560;" onclick="stopSleepMode()">⏹ 학습 종료</button>'; }

            html += '<div style="display: flex; flex-direction: column; gap: 10px;">';
            
            // 상단 줄: 학습 완료 버튼 | 엑셀 시트 선택
            html += '<div style="display: flex; gap: 10px;">';
            html += `<button class="btn-complete" onclick="toggleComplete()">${isCompleted ? '❌ 해제' : '✅ 학습 완료'}</button>`;
            html += `<select class="sheet-select" onchange="changeStudyModeMain(this)">`;
            const modes = ['단어', '문장표현', '문법', '전체랜덤'];
            modes.forEach(m => { html += `<option value="${m}" ${savedStudyMode === m ? 'selected' : ''}>${m}</option>`; });
            html += `</select>`;
            html += '</div>';

            // 중간 줄: 학습 시간 보기(저전력) | 설정 (좌우 50%씩)
            html += '<div style="display: flex; gap: 10px;">';
            if (!isPlaying) {
                html += `<button class="list-btn" style="flex: 1; color: #ffbc00; border-color: #ffbc00;" onclick="openCalendar()">📅 학습 시간 보기</button>`;
            } else {
                html += `<button class="list-btn" style="flex: 1; color: #ffbc00; border-color: #ffbc00;" onclick="toggleBlackout()">💡 저전력 모드</button>`;
            }
            html += `<button class="list-btn" style="flex: 1;" onclick="openSettings()">⚙️ 설정</button>`;
            html += '</div>';
            
            // 하단 퀵 설정 체크박스
            html += `<div class="quick-settings">`;
            html += `<label><input type="checkbox" id="mainReviewMode" ${reviewMode ? 'checked' : ''} onchange="toggleMainReview()"> ⭐ 별표 복습</label>`;
            html += `<label><input type="checkbox" id="mainShuffleMode" ${savedShuffle ? 'checked' : ''} onchange="toggleMainShuffle()"> 🔀 랜덤 재생</label>`;
            html += `</div>`;
            
            html += '</div></div></div>';
            document.getElementById('app').innerHTML = html;
        }

        // 메인 시트 변경 함수
        function changeStudyModeMain(el) {
            savedStudyMode = el.value;
            localStorage.setItem('vn_studyMode', savedStudyMode);
            savedIndex = 0;
            loadData(savedStudyMode);
        }

        function toggleStar() {
            const w = words[savedIndex];
            if (starredWords[w.A]) delete starredWords[w.A];
            else starredWords[w.A] = true;
            localStorage.setItem('vn_starred', JSON.stringify(starredWords));
            renderWord();
        }

        function toggleMainReview() {
            reviewMode = document.getElementById('mainReviewMode').checked;
            localStorage.setItem('vn_reviewMode', reviewMode);
            savedIndex = 0;
            applyModeFilter();
        }

        function toggleMainShuffle() {
            savedShuffle = document.getElementById('mainShuffleMode').checked;
            localStorage.setItem('vn_shuffle', savedShuffle);
            renderWord();
        }

        function openSettings() { 
            document.getElementById('settingsModal').style.display = 'block'; 
            document.getElementById('voiceRate').value = savedVoiceRate; 
            document.getElementById('sleepTimer').value = savedTimer; 
            document.getElementById('wordCountDisplay').innerText = savedWordCount + '번'; 
            document.getElementById('sentenceCountDisplay').innerText = savedSentenceCount + '번'; 
            document.getElementById('delayTime').value = savedDelayTime;
            document.getElementById('hideKrWord').checked = savedHideKrWord;
            document.getElementById('hideKrEx').checked = savedHideKrEx;
        }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; renderWord(); }
        
        function changeStudyMode() { 
            savedStudyMode = document.getElementById('studyMode').value; 
            localStorage.setItem('vn_studyMode', savedStudyMode); 
            savedIndex = 0; loadData(savedStudyMode); 
        }

        function saveSettings() { 
            savedVoiceRate = document.getElementById('voiceRate').value; savedTimer = document.getElementById('sleepTimer').value; 
            savedDelayTime = document.getElementById('delayTime').value;
            savedHideKrWord = document.getElementById('hideKrWord').checked; savedHideKrEx = document.getElementById('hideKrEx').checked;
            localStorage.setItem('vn_voiceRate', savedVoiceRate); localStorage.setItem('vn_timer', savedTimer); 
            localStorage.setItem('vn_delayTime', savedDelayTime);
            localStorage.setItem('vn_hideKrWord', savedHideKrWord); localStorage.setItem('vn_hideKrEx', savedHideKrEx);
        }

        function changeGlobalCount(type, n) { if (type === 'word') { savedWordCount = Math.max(0, Math.min(100, savedWordCount + n)); document.getElementById('wordCountDisplay').innerText = savedWordCount + '번'; } else { savedSentenceCount = Math.max(0, Math.min(100, savedSentenceCount + n)); document.getElementById('sentenceCountDisplay').innerText = savedSentenceCount + '번'; } localStorage.setItem('vn_wordCount', savedWordCount); localStorage.setItem('vn_sentenceCount', savedSentenceCount); }
        function moveWord(direction) { isSkipping = true; skipDirection = direction; window.speechSynthesis.cancel(); if (!isPlaying) { savedIndex += direction; if (savedIndex < 0) savedIndex = words.length - 1; if (savedIndex >= words.length) savedIndex = 0; renderWord(); } }
        function toggleComplete() { let w = words[savedIndex]; if (completedWords[w.A]) { delete completedWords[w.A]; } else { completedWords[w.A] = true; moveWord(1); } localStorage.setItem('vn_completed', JSON.stringify(completedWords)); renderWord(); }
        
        async function startSleepMode() { 
            if (isPlaying) return; isPlaying = true; requestWakeLock();
            if (sleepTimerId) clearTimeout(sleepTimerId);
            const timerVal = parseInt(savedTimer); 
            if (timerVal > 0) sleepTimerId = setTimeout(() => stopSleepMode(), timerVal * 60 * 1000);
            
            while (isPlaying) {
                if (savedIndex >= words.length) savedIndex = 0;
                localStorage.setItem('vn_index', savedIndex); isSkipping = false; renderWord();
                const w = words[savedIndex];
                if (completedWords[w.A] && !reviewMode) { advanceIndex(); continue; }
                
                if (savedWordCount > 0) {
                    for (let i = 0; i < savedWordCount; i++) {
                        if (!isPlaying || isSkipping) break;
                        await speakText(w.A, 'vi-VN');
                        if (!isPlaying || isSkipping) break;
                        if (!savedHideKrWord) await speakText(w.C, 'ko-KR');
                        await new Promise(r => setTimeout(r, parseInt(savedDelayTime)));
                    }
                }
                if (w.D && savedSentenceCount > 0) {
                    for (let i = 0; i < savedSentenceCount; i++) {
                        if (!isPlaying || isSkipping) break;
                        await speakText(w.D, 'vi-VN');
                        if (!isPlaying || isSkipping) break;
                        if (!savedHideKrEx) await speakText(w.F, 'ko-KR');
                        await new Promise(r => setTimeout(r, parseInt(savedDelayTime)));
                    }
                }
                advanceIndex();
            }
        }

        function stopSleepMode() { isPlaying = false; isSkipping = true; window.speechSynthesis.cancel(); if (sleepTimerId) clearTimeout(sleepTimerId); releaseWakeLock(); renderWord(); }
        function speakText(text, lang) { return new Promise(resolve => { if(!text || isSkipping) return resolve(); const msg = new SpeechSynthesisUtterance(text); msg.lang = lang; msg.rate = parseFloat(savedVoiceRate); msg.onend = resolve; msg.onerror = resolve; window.speechSynthesis.speak(msg); }); }
        function advanceIndex() { if (savedShuffle && !isSkipping) savedIndex = Math.floor(Math.random() * words.length); else if (isSkipping) savedIndex += skipDirection; else savedIndex++; }
        
        function openCalendar() { currentCalDate = new Date(); renderCalendar(); document.getElementById('calendarModal').style.display = 'block'; renderWeeklyChart(); }
        function closeCalendar() { document.getElementById('calendarModal').style.display = 'none'; }
        function getTodayStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        
        function toggleBlackout() { 
            const o = document.getElementById('blackoutOverlay'); 
            o.style.display = (o.style.display === 'none') ? 'flex' : 'none'; 
        }

        function renderWeeklyChart() {
            const container = document.getElementById('weeklyBarChart'); container.innerHTML = '';
            const days = ['일','월','화','수','목','금','토']; const today = new Date();
            let maxSec = 1; const weekData = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date(); d.setDate(today.getDate() - i);
                const dateStr = getTodayStr(d); const sec = dailyTime[dateStr] || 0;
                if (sec > maxSec) maxSec = sec; weekData.push({ day: days[d.getDay()], sec: sec });
            }
            weekData.forEach(data => {
                const height = Math.max(2, (data.sec / maxSec) * 50);
                container.innerHTML += `<div class="report-bar-wrapper"><div class="report-bar" style="height:${height}px; ${data.sec === 0 ? 'background:#333;' : ''}"></div><div class="report-day">${data.day}</div></div>`;
            });
        }

        function renderCalendar() {
            const year = currentCalDate.getFullYear(); const month = currentCalDate.getMonth();
            document.getElementById('calTitle').innerText = `${year}년 ${month+1}월`;
            const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month+1, 0).getDate();
            let html = ''; ['일','월','화','수','목','금','토'].forEach(d => html += `<div class="cal-header">${d}</div>`);
            for(let i=0; i<firstDay; i++) html += '<div class="cal-day"></div>';
            for(let i=1; i<=daysInMonth; i++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const m = (dailyTime[dateStr] || 0) / 60;
                let medal = m >= 60 ? '🥇' : (m >= 30 ? '🥈' : (m >= 10 ? '🥉' : ''));
                html += `<div class="cal-day"><div class="cal-date">${i}</div><div class="cal-medal">${medal}</div></div>`;
            }
            document.getElementById('calendarGrid').innerHTML = html;
            const todayStr = getTodayStr(new Date());
            document.getElementById('statToday').innerText = Math.floor((dailyTime[todayStr] || 0)/60) + '분';
            document.getElementById('statWords').innerText = Object.keys(completedWords).length + '개';
        }

        function openCompletedList() {
            const container = document.getElementById('compListContainer'); container.innerHTML = '';
            Object.keys(completedWords).forEach(wordA => {
                container.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333;"><span>${wordA}</span><button onclick="uncheckWord('${wordA}')" style="background:#e94560; color:white; border:none; padding:5px 10px; border-radius:5px;">해제</button></div>`;
            });
            document.getElementById('compModal').style.display = 'block';
        }
        function closeModal() { document.getElementById('compModal').style.display = 'none'; renderWord(); }
        function uncheckWord(wordA) { delete completedWords[wordA]; localStorage.setItem('vn_completed', JSON.stringify(completedWords)); openCompletedList(); }
        function changeMonth(offset) { currentCalDate.setMonth(currentCalDate.getMonth() + offset); renderCalendar(); }
    </script>
</body>
</html>
