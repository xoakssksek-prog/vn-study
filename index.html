<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>명희의 수면 베트남어 마스터</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        /* 기본 레이아웃 */
        body { font-family: sans-serif; text-align: center; background-color: #1a1a2e; color: white; padding: 0; margin: 0; overflow-x: hidden; width: 100%; }
        .card { background: #16213e; border-radius: 0; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); width: 100%; min-height: 90vh; margin: 0; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
        
        .vn { font-size: 50px; font-weight: bold; color: #4ecca3; margin-bottom: 5px; word-break: break-word; }
        .pron { font-size: 25px; color: #f2a365; margin-bottom: 5px; }
        .kr { font-size: 24px; color: #eee; margin-bottom: 20px; }
        .ex-vn { font-size: 28px; color: #4ecca3; margin-top: 15px; word-break: break-word; }
        .ex-pron { font-size: 20px; color: #f2a365; }
        .ex-kr { font-size: 18px; color: #ccc; margin-bottom: 15px; }
        
        .controls-row { display: flex; justify-content: space-between; align-items: center; background: #0f3460; padding: 10px; border-radius: 10px; margin-top: 15px; }
        .nav-btn { background: #3a4750; color: white; border: none; padding: 15px 10px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; flex: 1; margin: 0 5px; }
        .btn-complete { padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: #ffbc00; color: #1a1a2e; }
        .list-btn { background: transparent; color: #4ecca3; border: 1px solid #4ecca3; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; }
        .play-btn { font-size: 22px; padding: 18px; border: none; border-radius: 10px; cursor: pointer; background: #e94560; color: white; font-weight: bold; width: 100%; margin-top: 15px;}
        .status { margin-top: 15px; font-size: 16px; color: #888; }

        /* 모달 설정 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; padding-top: 30px; }
        .modal-content { background: #16213e; margin: auto; width: 95%; max-width: 500px; border-radius: 15px; padding: 15px; text-align: left; box-sizing: border-box; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-title { font-size: 20px; font-weight: bold; color: #4ecca3; text-align: center; flex: 1; }
        .close-btn { background: #e94560; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }

        /* 가로 모드 (핸드폰을 옆으로 눕혔을 때) - 한 화면에 다 들어가게 수정 */
        @media screen and (orientation: landscape) {
            body { overflow: hidden; height: 100vh; }
            .card { min-height: 100vh; height: 100vh; padding: 5px 15px !important; justify-content: space-around; }
            .hide-in-landscape { display: none !important; }
            
            .vn { font-size: 35px !important; margin: 0 !important; }
            .pron { font-size: 18px !important; margin: 0 !important; }
            .kr { font-size: 18px !important; margin-bottom: 5px !important; }
            
            hr { margin: 2px 0 !important; }
            
            .ex-vn { font-size: 22px !important; margin-top: 0 !important; }
            .ex-pron { font-size: 16px !important; }
            .ex-kr { font-size: 16px !important; margin-bottom: 5px !important; }
            
            .controls-row { margin-top: 0 !important; padding: 4px !important; }
            .nav-btn { font-size: 16px !important; padding: 8px !important; }
            .btn-complete, .list-btn, .play-btn { font-size: 16px !important; padding: 8px !important; margin-top: 5px !important; }
            .status { font-size: 12px !important; margin-top: 2px !important; }
        }

        /* 기타 스타일 */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 4px; }
        .cal-header { font-size: 12px; font-weight: bold; color: #4ecca3; text-align: center; padding: 5px; }
        .cal-day { background: #16213e; border-radius: 4px; aspect-ratio: 1/1.2; display: flex; flex-direction: column; align-items: center; border: 1px solid #222; }
        .cal-date { font-size: 10px; align-self: flex-start; padding: 2px; }
        .stats-panel { background: #0f3460; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 13px; }
        .stats-val { color: white; font-weight: bold; float: right; }
        .count-controls { display: flex; align-items: center; gap: 8px; }
        .count-controls button { width: 30px; height: 30px; border-radius: 5px; border: none; background: #4ecca3; cursor: pointer; }
    </style>
</head>
<body>

    <div id="blackoutOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: #444; cursor: pointer;" onclick="toggleBlackout()">
        <p style="font-size: 20px;">절전 모드 작동 중</p>
        <p style="font-size: 14px;">화면을 터치하면 다시 켜집니다</p>
    </div>

    <div id="app">
        <div class="card"><p>데이터 로딩 중...</p></div>
    </div>
    
    <div class="footer-text hide-in-landscape" style="text-align: center; font-size: 12px; color: #666; margin: 15px 0;">
        맹여사 그리고 이아빠 공부 열심히 하자 화이팅! 💖
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">⚙️ 학습 설정</div>
                <button class="close-btn" onclick="closeSettings()">닫기</button>
            </div>
            <div style="background: #0f3460; padding: 15px; border-radius: 10px; text-align: left;">
                <label style="display: block; font-size: 14px; margin-bottom: 15px; color: #4ecca3; font-weight:bold;">📚 엑셀 시트 선택: 
                    <select id="studyMode" onchange="changeStudyMode()" style="width: 100%; padding: 12px; font-size: 16px; border-radius: 5px; border: none; background: #1a1a2e; color: white; margin-top: 5px;">
                        <option value="단어">1. 단어 시트 학습</option>
                        <option value="문장표현">2. 문장표현 시트 학습</option>
                        <option value="문법">3. 문법 시트 학습</option>
                        <option value="전체랜덤">4. 모든 시트 랜덤</option>
                    </select>
                </label>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <label style="font-size: 14px; color: #ccc; display: flex; align-items: center; gap: 5px;"><input type="checkbox" id="shuffleMode" onchange="saveSettings()"> 🔀 랜덤 재생</label>
                    <label style="font-size: 14px; color: #ccc;">⏰ 타이머: 
                        <select id="sleepTimer" onchange="saveSettings()" style="padding: 5px; border-radius: 5px; background: #1a1a2e; color: white; border: none;">
                            <option value="0">끄기</option><option value="15">15분</option><option value="30">30분</option><option value="60">60분</option><option value="120">120분</option>
                        </select>
                    </label>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span>🔁 본문 반복:</span>
                    <div class="count-controls"><button onclick="changeGlobalCount('word', -1)">-</button><span id="wordCountDisplay">3번</span><button onclick="changeGlobalCount('word', 1)">+</button></div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <span>🔁 예문 반복:</span>
                    <div class="count-controls"><button onclick="changeGlobalCount('sentence', -1)">-</button><span id="sentenceCountDisplay">1번</span><button onclick="changeGlobalCount('sentence', 1)">+</button></div>
                </div>
                <label style="display: block; font-size: 14px; margin-bottom: 10px;">🗣️ 발음 속도: 
                    <select id="voiceRate" onchange="saveSettings()" style="width: 100%; padding: 12px; border-radius: 5px; border: none; background: #1a1a2e; color: white;">
                        <option value="0.6">저속</option><option value="0.9">일반</option><option value="1.3">고속</option>
                    </select>
                </label>
            </div>
        </div>
    </div>

    <div id="compModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" style="text-align: left;">✅ 학습 완료 목록</div>
                <button class="close-btn" onclick="closeModal()">닫기</button>
            </div>
            <div id="compListContainer"></div>
        </div>
    </div>

    <div id="calendarModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="nav-btn" style="flex: 0 0 40px; padding: 5px;" onclick="changeMonth(-1)">◀</button>
                <div class="modal-title" id="calTitle">학습 시간 보기</div>
                <button class="nav-btn" style="flex: 0 0 40px; padding: 5px;" onclick="changeMonth(1)">▶</button>
                <button class="close-btn" style="margin-left: 10px;" onclick="closeCalendar()">닫기</button>
            </div>
            <div class="cal-grid" id="calendarGrid"></div>
            <div class="stats-panel">
                <div>⌛ 오늘 학습 <span class="stats-val" id="statToday" style="color: #ffbc00;">0분</span></div>
                <div>✅ 완료 단어수 <span class="stats-val" id="statWords" style="color: #ffbc00;">0개</span></div>
            </div>
        </div>
    </div>

    <script>
        const sheetId = '1AiQwqgLg_XBHTiHWZXY0n2qN2Mz4NfIVcR2MxRfqkOc';
        const sheetNames = { '단어': '단어', '문장표현': '문장표현', '문법': '문법' };
        let words = []; let isPlaying = false; let isSkipping = false; let skipDirection = 1; let sleepTimerId = null;
        let savedIndex = 0; let completedWords = {}; let dailyTime = {};
        
        try { savedIndex = parseInt(localStorage.getItem('vn_index') || '0'); } catch(e) {}
        try { completedWords = JSON.parse(localStorage.getItem('vn_completed') || '{}'); } catch(e) { completedWords = {}; }
        try { dailyTime = JSON.parse(localStorage.getItem('vn_daily_time') || '{}'); } catch(e) { dailyTime = {}; }

        let savedVoiceRate = localStorage.getItem('vn_voiceRate') || '0.9';
        let savedGapTime = localStorage.getItem('vn_gapTime') || '1500';
        let savedWordCount = parseInt(localStorage.getItem('vn_wordCount') || '3');
        let savedSentenceCount = parseInt(localStorage.getItem('vn_sentenceCount') || '1');
        let savedTimer = localStorage.getItem('vn_timer') || '0';
        let savedShuffle = localStorage.getItem('vn_shuffle') === 'true';
        let savedStudyMode = localStorage.getItem('vn_studyMode') || '단어'; 
        let currentCalDate = new Date(); 

        loadData(savedStudyMode);

        setInterval(() => {
            const todayStr = getTodayStr(new Date());
            if (!dailyTime[todayStr]) dailyTime[todayStr] = 0;
            dailyTime[todayStr] += 10;
            localStorage.setItem('vn_daily_time', JSON.stringify(dailyTime));
            if (document.getElementById('calendarModal').style.display === 'block') { updateStatsDisplay(); }
        }, 10000);

        async function loadData(mode) {
            words = []; const appDiv = document.getElementById('app');
            try {
                if (mode === '전체랜덤') {
                    for (const name in sheetNames) { const data = await fetchSheetByName(sheetNames[name]); words = words.concat(data); }
                } else { words = await fetchSheetByName(sheetNames[mode]); }
            } catch (e) {}
            if (words.length > 0) { if (savedIndex >= words.length) savedIndex = 0; renderWord(); }
        }

        async function fetchSheetByName(name) {
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
            const res = await fetch(url); const data = await res.text();
            const rows = data.split('\n').slice(1);
            return rows.map(row => {
                const cols = row.split('","').map(c => c.replace(/(^"|"$)/g, ''));
                return { A: cols[0] || '', B: cols[1] || '', C: cols[2] || '', D: cols[3] || '', E: cols[4] || '', F: cols[5] || '' };
            }).filter(w => w.A.trim() !== '');
        }

        function renderWord() {
            if (words.length === 0) return;
            const w = words[savedIndex]; const isCompleted = completedWords[w.A];
            let html = '<div class="card">';
            html += '<div class="status">[' + savedStudyMode + '] ' + (savedIndex + 1) + ' / ' + words.length + ' 항목</div>';
            if (isCompleted) { html += '<div class="completed-text">✅ 완료된 항목</div>'; }
            html += '<div class="vn">' + w.A + '</div>';
            if (w.B) html += '<div class="pron">[ ' + w.B + ' ]</div>';
            html += '<div class="kr">' + w.C + '</div>';
            if (w.D || w.F) {
                html += '<hr style="border:1px solid #333;">';
                html += '<div class="ex-vn">' + w.D + '</div>';
                if (w.E) html += '<div class="ex-pron">[ ' + w.E + ' ]</div>';
                html += '<div class="ex-kr">' + w.F + '</div>';
            }
            html += '<div class="controls-row"><button class="nav-btn" onclick="moveWord(-1)">◀ 뒤로</button><button class="nav-btn" onclick="moveWord(1)">넘기기 ▶</button></div>';
            html += '<div style="display: flex; gap: 10px; margin-top: 10px;">';
            html += '<button class="btn-complete" style="flex: 1; margin: 0;" onclick="toggleComplete()">' + (isCompleted ? '❌ 완료 해제' : '✅ 학습 완료(제외)') + '</button>';
            if (!isPlaying) { html += '<button class="list-btn" style="flex: 1; margin: 0;" onclick="openModal()">📋 완료 목록</button>'; }
            else { html += '<button class="list-btn" style="flex: 1; margin: 0; color: #ccc; border-color: #777;" onclick="toggleBlackout()">💡 화면 끄기</button>'; }
            html += '</div>';
            html += '<div class="hide-in-landscape" style="display: flex; gap: 10px; margin-top: 10px;">';
            html += '<button class="list-btn" style="flex: 1; color: #ffbc00; border-color: #ffbc00;" onclick="openCalendar()">📅 학습 시간 보기</button>';
            html += '<button class="list-btn" style="flex: 1; color: #4ecca3; border-color: #4ecca3;" onclick="openSettings()">⚙️ 학습 설정</button>';
            html += '</div>';
            if (!isPlaying) { html += '<button id="playBtn" class="play-btn" onclick="startSleepMode()">🌙 수면 학습 시작</button>'; }
            else { html += '<button class="play-btn" style="background: #e94560;" onclick="stopSleepMode()">⏹ 학습 종료</button>'; }
            html += '</div>';
            document.getElementById('app').innerHTML = html;
        }

        function openSettings() { document.getElementById('settingsModal').style.display = 'block'; document.getElementById('studyMode').value = savedStudyMode; document.getElementById('voiceRate').value = savedVoiceRate; document.getElementById('sleepTimer').value = savedTimer; document.getElementById('shuffleMode').checked = savedShuffle; document.getElementById('wordCountDisplay').innerText = savedWordCount + '번'; document.getElementById('sentenceCountDisplay').innerText = savedSentenceCount + '번'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; renderWord(); }
        function changeStudyMode() { savedStudyMode = document.getElementById('studyMode').value; localStorage.setItem('vn_studyMode', savedStudyMode); savedIndex = 0; loadData(savedStudyMode); }
        function saveSettings() { savedVoiceRate = document.getElementById('voiceRate').value; savedTimer = document.getElementById('sleepTimer').value; savedShuffle = document.getElementById('shuffleMode').checked; localStorage.setItem('vn_voiceRate', savedVoiceRate); localStorage.setItem('vn_timer', savedTimer); localStorage.setItem('vn_shuffle', savedShuffle); }
        function changeGlobalCount(type, n) { if (type === 'word') { savedWordCount = Math.max(0, Math.min(100, savedWordCount + n)); localStorage.setItem('vn_wordCount', savedWordCount); document.getElementById('wordCountDisplay').innerText = savedWordCount + '번'; } else { savedSentenceCount = Math.max(0, Math.min(100, savedSentenceCount + n)); localStorage.setItem('vn_sentenceCount', savedSentenceCount); document.getElementById('sentenceCountDisplay').innerText = savedSentenceCount + '번'; } }
        function toggleBlackout() { const overlay = document.getElementById('blackoutOverlay'); overlay.style.display = (overlay.style.display === 'none') ? 'flex' : 'none'; }
        function stopSleepMode() { isPlaying = false; isSkipping = true; window.speechSynthesis.cancel(); if (sleepTimerId) clearTimeout(sleepTimerId); renderWord(); }
        function toggleComplete() { let w = words[savedIndex]; if (completedWords[w.A]) { delete completedWords[w.A]; localStorage.setItem('vn_completed', JSON.stringify(completedWords)); renderWord(); } else { completedWords[w.A] = true; localStorage.setItem('vn_completed', JSON.stringify(completedWords)); moveWord(1); } }
        function moveWord(direction) { isSkipping = true; skipDirection = direction; window.speechSynthesis.cancel(); if (!isPlaying) { savedIndex += direction; if (savedIndex < 0) savedIndex = words.length - 1; if (savedIndex >= words.length) savedIndex = 0; renderWord(); } }
        function speakText(text, lang) { return new Promise(resolve => { if (!text || text.trim() === '' || isSkipping) return resolve(); const msg = new SpeechSynthesisUtterance(text); msg.lang = lang; msg.rate = parseFloat(savedVoiceRate); msg.onend = resolve; msg.onerror = resolve; window.speechSynthesis.speak(msg); setTimeout(resolve, 8000); }); }
        async function smartDelay(ms) { if (ms <= 0) return; let waited = 0; while (waited < ms && !isSkipping && isPlaying) { await new Promise(r => setTimeout(r, 100)); waited += 100; } }
        function advanceIndex() { if (!isSkipping) { if (savedShuffle && words.length > 1) { let nextIndex = savedIndex; while (nextIndex === savedIndex) { nextIndex = Math.floor(Math.random() * words.length); } savedIndex = nextIndex; } else { savedIndex++; } } else { savedIndex += skipDirection; } }
        async function startSleepMode() { if (isPlaying) return; isPlaying = true; if (sleepTimerId) clearTimeout(sleepTimerId); const timerVal = parseInt(savedTimer); if (timerVal > 0) { sleepTimerId = setTimeout(() => { stopSleepMode(); }, timerVal * 60 * 1000); } while (isPlaying) { if (savedIndex >= words.length) savedIndex = 0; if (savedIndex < 0) savedIndex = words.length - 1; localStorage.setItem('vn_index', savedIndex); isSkipping = false; renderWord(); const w = words[savedIndex]; const currentGap = parseInt(savedGapTime); if (completedWords[w.A]) { await new Promise(r => setTimeout(r, 10)); advanceIndex(); continue; } if (savedWordCount > 0) { for (let i = 0; i < savedWordCount; i++) { if (!isPlaying || isSkipping) break; await speakText(w.A, 'vi-VN'); if (!isPlaying || isSkipping) break; await speakText(w.C, 'ko-KR'); await smartDelay(currentGap); } } if (!isPlaying || isSkipping) { advanceIndex(); continue; } if (w.D && w.F && savedSentenceCount > 0) { for (let i = 0; i < savedSentenceCount; i++) { if (!isPlaying || isSkipping) break; await speakText(w.D, 'vi-VN'); if (!isPlaying || isSkipping) break; await speakText(w.F, 'ko-KR'); await smartDelay(currentGap); } } if (!isPlaying || isSkipping) { advanceIndex(); continue; } await smartDelay(1000); advanceIndex(); } }
        function openModal() { const container = document.getElementById('compListContainer'); container.innerHTML = ''; const compKeys = Object.keys(completedWords); if(compKeys.length === 0) { container.innerHTML = '<p style="color:#888;">항목이 없습니다.</p>'; } else { compKeys.forEach(wordA => { const wordData = words.find(w => w.A === wordA); const mean = wordData ? wordData.C : ''; container.innerHTML += `<div class="comp-item" id="item_${wordA}"><div><div class="comp-word">${wordA}</div><div class="comp-mean">${mean}</div></div><button class="uncheck-btn" onclick="uncheckWord('${wordA}')">해제</button></div>`; }); } document.getElementById('compModal').style.display = 'block'; }
        function closeModal() { document.getElementById('compModal').style.display = 'none'; renderWord(); }
        function uncheckWord(wordA) { delete completedWords[wordA]; localStorage.setItem('vn_completed', JSON.stringify(completedWords)); const el = document.getElementById('item_' + wordA); if(el) el.style.display = 'none'; }
        function getTodayStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function openCalendar() { currentCalDate = new Date(); renderCalendar(); document.getElementById('calendarModal').style.display = 'block'; }
        function closeCalendar() { document.getElementById('calendarModal').style.display = 'none'; }
        function changeMonth(offset) { currentCalDate.setMonth(currentCalDate.getMonth() + offset); renderCalendar(); }
        function formatTimeText(seconds) { if (!seconds || seconds <= 0) return '0분'; const h = Math.floor(seconds / 3600); const m = Math.floor((seconds % 3600) / 60); return h > 0 ? `${h}h ${m}m` : `${m}m`; }
        function updateStatsDisplay() { const todayStr = getTodayStr(new Date()); let todaySec = dailyTime[todayStr] || 0; document.getElementById('statToday').innerText = formatTimeText(todaySec); document.getElementById('statWords').innerText = Object.keys(completedWords).length + '개'; }
        
        function renderCalendar() {
            const year = currentCalDate.getFullYear(); const month = currentCalDate.getMonth();
            const todayStr = getTodayStr(new Date()); document.getElementById('calTitle').innerText = `${year}년 ${month + 1}월`;
            const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = '<div class="cal-grid">'; const days = ['일', '월', '화', '수', '목', '금', '토'];
            days.forEach(d => { html += `<div class="cal-header">${d}</div>`; });
            for(let i=0; i<firstDay; i++) { html += `<div class="cal-day" style="background:transparent;border:none;"></div>`; }
            for(let i=1; i<=daysInMonth; i++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                let sec = dailyTime[dateStr] || 0; let medal = '';
                if (dateStr <= todayStr) {
                    const m = sec / 60;
                    if (m >= 120) medal = '💎'; else if (m >= 60) medal = '🥇';
                    else if (m >= 30) medal = '🥈'; else if (m >= 10) medal = '🥉';
                    else medal = '💩';
                }
                let todayStyle = dateStr === todayStr ? 'border: 1px solid #e94560;' : '';
                html += `<div class="cal-day" style="${todayStyle}"><div class="cal-date">${i}</div><div class="cal-medal">${medal}</div></div>`;
            }
            html += '</div>';
            document.getElementById('calendarGrid').innerHTML = html; updateStatsDisplay();
        }
    </script>
</body>
</html>
